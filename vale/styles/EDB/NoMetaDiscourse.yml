extends: existence
message: "Avoid 'documenting the documentation' (e.g., '%s'). Be direct and focus on the task or product instead."
level: error
# Use 'text' scope to skip code and focus on prose
scope: text
ignorecase: true
tokens:
  - 'this (?:section|guide|document|chapter|page|topic) (?:is about|explains|covers|describes|discusses|will show)'
  - 'in this (?:section|guide|document|chapter|page|topic)'
  - 'the following (?:section|paragraphs|steps|command|commands) (?:will|describes|explains)'
  - 'this (?:section|guide) provides'
  - 'aims to explain'
  - 'purpose of this (?:guide|section|document) is'
