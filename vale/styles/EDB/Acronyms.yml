extends: conditional
message: "'%s' should be defined on first use (e.g., 'Postgres Enterprise Manager (PEM)')."
link: https://docs.microsoft.com/en-us/style-guide/acronyms
level: suggestion
ignorecase: false
# Ensure it only checks prose, not code blocks or frontmatter keys
scope: text
# The acronym: 3 to 5 uppercase letters
first: '\b([A-Z]{3,5})\b'
# The definition: Look for words followed by the acronym in parentheses
# This version is more lenient with capitalization in the definition
second: '(?:\b[A-Za-z]+ )+\(([A-Z]{3,5})\)'
# Add your common terms here to stop the false positives
exceptions:
  - ALTER
  - API
  - ASP
  - CLI
  - CPU
  - CSS
  - CSV
  - DBA
  - DEBUG
  - DDL
  - DML
  - DOM
  - DPI
