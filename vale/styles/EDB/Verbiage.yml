extends: substitution
message: "EDB Style: Use '%s' instead of '%s'."
level: error
ignorecase: true
swap:
  e.g.: "for example"
  i.e.: "that is"
  viz.: "namely"
  due to the fact that: "because"
  in order to: "to"
  at the present time: "now"
  log into: "log in to"
  click: "select" # EDB preference: 'Select' for UI, but check context
  may: "might or can"
  etc: "ecetera"  
