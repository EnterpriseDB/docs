extends: existence
message: "Avoid using 'this' without a following noun. (e.g., use 'This configuration' instead of 'This is...')"
level: warning
scope: text
ignorecase: false
# This regex looks for 'This' or 'this' followed by:
# 1. Common verbs (is, are, was, were, has, provides, ensures, etc.)
# 2. Punctuation or end of string
# 3. Or simply not followed by a word character (like a space then a verb)
tokens:
  - '\b[Tt]his\s+(?:is|are|was|were|has|have|can|could|will|should|must|provides|ensures|allows)\b'
  - '\b[Tt]his[.,;:!)]'
  - '\b[Tt]his\s*$'
