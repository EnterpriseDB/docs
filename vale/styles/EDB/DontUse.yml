extends: substitution
message: "EDB Style: %s (avoid '%s')"
level: error
ignorecase: true
scope: text
# In a substitution rule, the 'key' is the error and the 'value' is the suggestion/explanation
swap:
  please: "Avoid 'please'. State the instruction directly as a command."
  note that: "Avoid 'Note that'. Start the sentence directly."
  guide: "Avoid referring to 'this guide'. Use the product name or 'documentation'."
  should: "Avoid 'should' for lack of precision. Use 'can' or an imperative."
  could: "Avoid 'could' for lack of precision. Use 'can' or 'will'."
  would: "Avoid 'would' for lack of precision. Use 'will'."
