extends: existence
message: "The frontmatter description must end with a period or a colon."
level: warning
scope: raw
# Regex breakdown:
# description:  -> Finds the specific line in the frontmatter
# .* -> Matches the text of the description
# [a-zA-Z0-9]   -> Matches the last character if it is a letter or number
# (?![.:])      -> Negative lookahead: NOT followed by a period or colon
# \s* -> Optional trailing spaces
# $             -> End of the line
tokens:
  - '(?m)^description:.*[a-zA-Z0-9](?![.:])\s*$'
