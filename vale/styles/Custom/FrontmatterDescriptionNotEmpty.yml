extends: existence
message: "The description in the frontmatter is missing or empty."
level: error
scope: raw
# Regex breakdown:
# (?s)       -> Single-line mode: dot matches newlines
# ^---\s* -> Match start of frontmatter (---)
# (?!.*description:\s*\S) -> Negative lookahead for "description:" followed by non-whitespace
# .*?        -> Non-greedy match for anything (the rest of the frontmatter)
# ---        -> End of frontmatter block
raw:
  - '(?s)^---\s*(?!.*description:\s*\S).*?---'
