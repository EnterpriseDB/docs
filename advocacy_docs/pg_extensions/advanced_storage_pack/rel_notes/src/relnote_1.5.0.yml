product: Advanced Storage Pack
version: 1.5.0
date: 23 March 2026
intro: |
  Advanced Storage Pack 1.5.0 introduces several performance enhancements and critical stability fixes.
relnotes:
- relnote: Added `bluefin.estimate_compression[_blocks]()` functions for Bluefin.
  details: |
    Introduced new utility functions to estimate the potential compression ratio before migrating a target Heap table to Bluefin format.
  jira: ""
  addresses: ""
  type: Enhancement
  impact: Medium
- relnote: Bluefin resolved memory leak during index scans
  details: |
    Fixed a memory leak occurring during index scans that could lead to excessive memory consumption or OOM (Out of Memory) errors when processing large tables.
  jira: ""
  addresses: ""
  type: Bug fix
  impact: Highest
- relnote: Bluefin fixed server crashes and leaks during TID scans
  details: |
    Resolved an issue where TID scans triggered assertion failures leading to server crashes and associated memory leaks.
  jira: ""
  addresses: ""
  type: Bug fix
  impact: Medium
- relnote: Bluefin fixed logical decoding for LZ4-compressed long tuples
  details: |
     Corrected logical decoding behavior for long tuples compressed with LZ4, covering both single-insert and multi-insert/COPY operations.
  jira: ""
  addresses: ""
  type: Bug fix
  impact: Medium