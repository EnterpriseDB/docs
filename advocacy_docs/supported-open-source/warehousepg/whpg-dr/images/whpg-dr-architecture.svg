<svg viewBox="0 0 760 200" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'Inter','Segoe UI',sans-serif">
  <title>whpg-dr architecture: primary cluster, storage repository, and DR cluster</title>
  <desc>Primary cluster ships WAL and base backups to a central storage repository over S3 or NFS. The DR cluster restores from the same repository. The two clusters have no direct connection to each other.</desc>
  <defs>
    <marker id="ah-teal" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto">
      <path d="M0,0 L0,7 L7,3.5 z" fill="#429D9E"/>
    </marker>
    <marker id="ah-amber" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto">
      <path d="M0,0 L0,7 L7,3.5 z" fill="#F89E5D"/>
    </marker>
  </defs>

  <rect width="760" height="200" rx="8" fill="#ffffff"/>

  <!-- Primary cluster -->
  <rect x="15" y="18" width="165" height="164" rx="8" fill="#136A7F"/>
  <text x="97" y="41" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">Primary cluster</text>
  <rect x="33" y="52" width="129" height="26" rx="5" fill="rgba(255,255,255,0.15)"/>
  <text x="97" y="69" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.85)">Coordinator</text>
  <rect x="33" y="88" width="60" height="26" rx="5" fill="rgba(255,255,255,0.10)"/>
  <text x="63" y="105" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.65)">Seg 0</text>
  <rect x="102" y="88" width="60" height="26" rx="5" fill="rgba(255,255,255,0.10)"/>
  <text x="132" y="105" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.65)">Seg 1</text>
  <rect x="33" y="124" width="60" height="26" rx="5" fill="rgba(255,255,255,0.10)"/>
  <text x="63" y="141" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.65)">Seg 2</text>
  <rect x="102" y="124" width="60" height="26" rx="5" fill="rgba(255,255,255,0.10)"/>
  <text x="132" y="141" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.65)">Seg 3</text>

  <!-- Arrow: Primary → Storage -->
  <line x1="180" y1="100" x2="243" y2="100" stroke="#429D9E" stroke-width="1.5" marker-end="url(#ah-teal)"/>
  <text x="211" y="91" text-anchor="middle" font-size="9" font-weight="600" fill="#429D9E">base backup</text>
  <text x="211" y="113" text-anchor="middle" font-size="9" fill="#888">WAL</text>

  <!-- Storage repository -->
  <rect x="248" y="18" width="264" height="164" rx="8" fill="#F4F8F9" stroke="#429D9E" stroke-width="1.5"/>
  <text x="380" y="41" text-anchor="middle" font-size="12" font-weight="700" fill="#429D9E">Storage repository</text>
  <text x="380" y="56" text-anchor="middle" font-size="9" fill="#888">S3 / NFS</text>
  <!-- Restore points -->
  <rect x="266" y="65" width="50" height="36" rx="5" fill="#E8F2F3" stroke="#C8D8DC" stroke-width="1"/>
  <text x="291" y="87" text-anchor="middle" font-size="8" font-weight="600" fill="#888">rp-1</text>
  <rect x="324" y="65" width="50" height="36" rx="5" fill="#E8F2F3" stroke="#C8D8DC" stroke-width="1"/>
  <text x="349" y="87" text-anchor="middle" font-size="8" font-weight="600" fill="#888">rp-2</text>
  <rect x="382" y="65" width="50" height="36" rx="5" fill="#E8F2F3" stroke="#C8D8DC" stroke-width="1"/>
  <text x="407" y="87" text-anchor="middle" font-size="8" font-weight="600" fill="#888">rp-3</text>
  <rect x="440" y="61" width="58" height="44" rx="5" fill="#FFF3E8" stroke="#F89E5D" stroke-width="2"/>
  <text x="469" y="81" text-anchor="middle" font-size="8" font-weight="700" fill="#C86E3A">latest</text>
  <text x="469" y="93" text-anchor="middle" font-size="7" fill="#F89E5D">▲ most recent</text>
  <!-- WAL archive + base backups -->
  <rect x="266" y="115" width="232" height="20" rx="5" fill="#E8F2F3"/>
  <text x="382" y="129" text-anchor="middle" font-size="9" fill="#555">Base backup</text>
  <rect x="266" y="139" width="232" height="20" rx="5" fill="#E8F2F3"/>
  <text x="382" y="153" text-anchor="middle" font-size="9" fill="#555">WAL</text>

  <!-- Arrow: Storage → DR -->
  <line x1="513" y1="100" x2="576" y2="100" stroke="#F89E5D" stroke-width="1.5" marker-end="url(#ah-amber)"/>
  <text x="545" y="91" text-anchor="middle" font-size="9" font-weight="600" fill="#F89E5D">restore</text>

  <!-- DR cluster -->
  <rect x="581" y="18" width="165" height="164" rx="8" fill="#136A7F"/>
  <text x="663" y="41" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">DR cluster</text>
  <rect x="599" y="52" width="129" height="26" rx="5" fill="rgba(255,255,255,0.15)"/>
  <text x="663" y="69" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.85)">Coordinator</text>
  <rect x="599" y="88" width="60" height="26" rx="5" fill="rgba(255,255,255,0.10)"/>
  <text x="629" y="105" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.65)">Seg 0</text>
  <rect x="668" y="88" width="60" height="26" rx="5" fill="rgba(255,255,255,0.10)"/>
  <text x="698" y="105" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.65)">Seg 1</text>
  <rect x="599" y="124" width="60" height="26" rx="5" fill="rgba(255,255,255,0.10)"/>
  <text x="629" y="141" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.65)">Seg 2</text>
  <rect x="668" y="124" width="60" height="26" rx="5" fill="rgba(255,255,255,0.10)"/>
  <text x="698" y="141" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.65)">Seg 3</text>
</svg>
