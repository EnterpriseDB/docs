# yaml-language-server: $schema=https://raw.githubusercontent.com/EnterpriseDB/docs/refs/heads/develop/tools/automation/generators/relgen/relnote-schema.json
product: LiveCompare
version: 3.1.2
date: 22 April 2026
intro: |

   !!! Note Note on upgrading
   Before you upgrade to LiveCompare 3.1, ensure that all previous LiveCompare sessions have been completed. You won't be able to resume any LiveCompare sessions that you started using an earlier version of LiveCompare.
   !!!

   !!! Note
   LiveCompare 3.1.1 was an internal release only. The changes that would have been included in 3.1.1, along with the changes introduced in 3.1.2, are documented on this page.
   !!!

   LiveCompare 3.1.2 includes the following new features, enhancements, bug fixes, and other changes:

relnotes:
- relnote: Fixed an issue where LiveCompare incorrectly used the Oracle <code>service</code> parameter instead of the PostgreSQL <code>dbname</code> parameter when initializing a Postgres database connection, causing connection failures.
  jira: LIV-322
  addresses: 55064
  type: Bug Fix
  impact: high
- relnote: Fixed an issue where a server-side cursor was referenced using an incorrect attribute name (<code>v_server_side_cursor_name</code> instead of <code>server_side_cursor_name</code>), causing failures when fetching data in server-side cursor mode.
  jira: LIV-317
  addresses:
  type: Bug Fix
  impact: medium
- relnote: Fixed an issue where processed row counts were being incremented twice, resulting in inaccurate row count reporting during a comparison.
  jira: LIV-323
  addresses: 56082
  type: Bug Fix
  impact: low
- relnote: Improved performance of the block hashing step in the Merkle tree comparison algorithm. LiveCompare now uses SHA-256-based hashing with digest caching, replacing Python's non-deterministic built-in <code>hash()</code> function, which could cause false mismatches across processes.
  jira: LIV-307
  addresses: 35656
  type: Enhancement
  impact: high
- relnote: LiveCompare is now built and distributed using Python 3.12 (<code>edb-python312</code>).
  jira: LIV-312
  addresses:
  type: Enhancement
  impact: medium
- relnote: Fixed a regression introduced in LiveCompare 3.1.0 where row hashes for PostgreSQL were returned as bytes instead of hex strings. This issue caused all row comparisons to fall back to full row comparison, producing false divergences.
  jira: LIV-331
  addresses:
  type: Bug Fix
  impact: high
