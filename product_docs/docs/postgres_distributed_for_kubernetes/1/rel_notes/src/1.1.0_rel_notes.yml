# yaml-language-server: $schema=https://raw.githubusercontent.com/EnterpriseDB/docs/refs/heads/develop/tools/automation/generators/relgen/relnote-schema.json
product: EDB Postgres® AI for CloudNativePG™ Global Cluster
version: 1.1.0
date: 25 December 2024
intro: |
  ## Highlights

  - *Support for New PG4K Release:* Starting with version 1.1.0, the PGD4K operator now supports the new PG4K Long-Term Support (LTS) release, version 1.25.
  - *New PGD Version Support:* PGD version 5.6.1 is now supported.

  ## Supported versions

  - Kubernetes: 1.32, 1.31, 1.30, and 1.29
  - PostgreSQL: 17, 16, 15, 14, and 13
  - PG4K: v1.22.8, v1.25.0

    Default PGD image: postgresql-pgd 17.2-5.6.1

    Default PGD proxy image: edb-pgd-proxy 5.6.0

    Officially dropped support for PostgreSQL 12

    PostgreSQL 13 support ends on November 12, 2025

  This release of EDB Postgres® AI for CloudNativePG™ Global Cluster includes the following:
relnotes:
  - relnote: New Operator Architecture Support
    details: Added support for linux/arm64 and linux/ppc64le architectures.
    jira: 
    type: Feature
    impact: High
  - relnote: Configuration Support for cnpg-i Plugin
    details: Configuration settings for the cnpg-i plugin have been implemented
    jira: 
    addresses: '#929'
    type: Feature
    impact: High
  - relnote: Avoid unnecessary failure over
    details: |-
      Avoid unnecessary write lead transfer when `reconcilePodSpec` is used in PG4K
      cluster
    jira: 
    addresses: '#885'
    type: Feature
    impact: High
  - relnote: Scale Down Write Leader Last
    details: The write leader will be the last PGD node to scale down
    jira: 
    addresses: '#920'
    type: Feature
    impact: High
  - relnote: Enhanced Restore Process
    details: |-
      The restore process has been improved by splitting it into components, and
      using separate jobs for different types of restore and bootstrap operations
    jira: 
    addresses: '#817, #852'
    type: Feature
    impact: High
  - relnote: Webhook Validation enhancement
    details: validity of `restore.serverNames` will be checked via the webhook
    jira: 
    addresses: '#932'
    type: Feature
    impact: High
  - relnote: Include clusterStatus as part of the PGDGroup status for information on the phase of the managed clusters.
    jira: 
    addresses: '#875'
    type: Feature
    impact: High
