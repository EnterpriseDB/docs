# yaml-language-server: $schema=https://raw.githubusercontent.com/EnterpriseDB/docs/refs/heads/develop/tools/automation/generators/relgen/relnote-schema.json
product: EDB Postgres® AI for CloudNativePG™ Global Cluster
version: 1.1.3
date: 24 September 2025
intro: |
  ## Highlights

  - *New PGD Version Support:* PGD version 5.9 is now supported
  - *New PG4K operator Version Support:* PG4K operator v1.26.1 is now supported

  ## Supported versions

  - Kubernetes: 1.33, 1.32, 1.31, and 1.30
  - Latest PGD with PostgreSQL: 17, 16, 15, 14, and 13

    PostgreSQL 17.6 is the default image

    PostgreSQL 13 support ends on November 12, 2025

  - PG4K: v1.25.0, v1.25.1, v1.25.2, v1.26.0,v1.26.1

  ## Default images

  - PGD: `docker.enterprisedb.com/k8s_enterprise_pgd/postgresql-pgd:17.6-pgd590-ubi9`
  - PGD proxy: `docker.enterprisedb.com/k8s_enterprise_pgd/edb-pgd-proxy:5.9.0-ubi9`

  This release of EDB Postgres® AI for CloudNativePG™ Global Cluster includes the following:
relnotes:
  - relnote: Barman Cloud Plugin
    details: |-
      Update the default Barman cloud plugin to v0.6.0. Support customization of the
      plugin image from the operator configmap
    jira: 
    addresses: '#1068, #1421'
    type: Feature
    impact: High
  - relnote: PGD Group Configuration
    details: Add support to configure instance pod env through pgdgroup YAML
    jira: 
    addresses: '#1509'
    type: Feature
    impact: High
  - relnote: PGD 5.9 compatibility
    details: enable_raft for subgroup could not be enabled with PGD 5.9
    jira: 
    addresses: '#1516'
    type: Bug Fix
    impact: High
  - relnote: VolumeSnapshot restore
    details: restore from VolumeSnapshot sometimes hangs during cleanup metadata phase
    jira: 
    addresses: '#1547'
    type: Bug Fix
    impact: High
  - relnote: Physical join logging
    details: |-
      Pipe the physical join (bdr_init_physical command) log with the PostgreSQL log
      into the physical join job
    jira: 
    addresses: '#1515'
    type: Bug Fix
    impact: High
  - relnote: TLS and certificates
    details: |-
      Mount the correct serverTLSSecret in the physical join job, fix physical join
      job failure when a self-signed certificate is used and only the private key is
      shared across regions
    jira: 
    addresses: '#1505'
    type: Bug Fix
    impact: High
  - relnote: Operator configmap name to use pgd-operator-controller-manager-config in all cases
    jira: 
    addresses: '#1493'
    type: Bug Fix
    impact: High
  - relnote: Show major version upgrade in PGDGroup phase
    jira: 
    addresses: '#1333'
    type: Bug Fix
    impact: High
  - relnote: Update the operator base image to latest version of ubi-micro v9.6.
    jira: 
    addresses: '#1514'
    type: Security
    impact: High
