# yaml-language-server: $schema=https://raw.githubusercontent.com/EnterpriseDB/docs/refs/heads/develop/tools/automation/generators/relgen/relnote-schema.json
product: EDB Postgres® AI for CloudNativePG™ Global Cluster
version: 1.0.0
date: 24 April 2024
intro: |
  This is the first major stable release of CNPG-GC, a Kubernetes operator to
  deploy and manage EDB Postgres Distributed clusters.

  The operator implements the `PGDGroup` custom resource in the API group
  `pgd.k8s.enterprisedb.io`. This resource can be used to create and manage EDB
  Postgres Distributed clusters inside Kubernetes.

  The CNPG-GC operator leverages [EDB Postgres for Kubernetes
  (PG4K)](https://www.enterprisedb.com/docs/postgres_for_kubernetes/latest/) and
  inherits many of that project's capabilities. CNPG-GC version 1.0 is based,
  specifically, on release 1.22 of PG4K. Please refer to the [PG4K release
  notes](https://www.enterprisedb.com/docs/postgres_for_kubernetes/latest/rel_notes/)
  for more details.

  This release of EDB Postgres® AI for CloudNativePG™ Global Cluster includes the following:
relnotes:
  - relnote: Deployment of EDB Postgres Distributed clusters with versions 5 and later
    jira: 
    type: Feature
    impact: High
  - relnote: Additional self-healing capability on top of that of Postgres Distributed, such as recovery and restart of failed PGD nodes
    jira: 
    type: Feature
    impact: High
  - relnote: Definition of the services to connect applications to the write leader of each PGD group
    jira: 
    type: Feature
    impact: High
  - relnote: Implementation of Raft subgroups
    jira: 
    type: Feature
    impact: High
  - relnote: TLS connections and client certificate authentication
    jira: 
    type: Feature
    impact: High
  - relnote: Continuous backup to an S3 compatible object store
    jira: 
    type: Feature
    impact: High
  - relnote: Pause and resume a PGD cluster, saving computational resources by temporarily removing database pods while keeping the database PVCs.
    jira: 
    type: Feature
    impact: High
