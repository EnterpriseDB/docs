intro: |
 This is a patch release of PGD 5, which includes several enhancements and bug fixes. For a list of known issues, see [Known issues](/pgd/current/known_issues/).

relnotes:
- relnote: Fixed user login attributes not replicated to peer nodes.
  details: |
    After a `CREATE USER` statement, the user's login attribute was not propagated to peer nodes, preventing login on any node other than the originating one. This fix ensures role login attributes are correctly included in replication.
  jira: BDR-7878
  component: BDR    
  type: Bug Fix
  impact: Medium
- relnote: Fixed Connection Manager using outdated routing configuration when routing was enabled or disabled on a node group.
  details: ""
  jira: BDR-7838
  component: PGD Proxy
  addresses: ""
  type: Bug Fix
  impact: Medium
- relnote: Updated third-party dependencies to address security vulnerabilities.
  details: |
    Updated internal library dependencies to address security vulnerabilities CVE-2026-33815 and CVE-2026-33816.
  component: PGD Proxy    
  jira:  BDR-7913
  addresses: ""
  type: Change
  impact: High