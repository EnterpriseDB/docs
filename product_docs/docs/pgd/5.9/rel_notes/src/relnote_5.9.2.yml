product: EDB Postgres Distributed
version: 5.9.2
date: 26 March 2026
components:
  "BDR": 5.9.2
  "PGD CLI": 5.9.2
  "PGD Proxy": 5.9.2
  "Utilities": 5.9.2
intro: |
 This is a patch release of PGD 5, which includes several enhancements and bug fixes. 

relnotes:
- relnote: Improved lock handling during change application to prevent data corruption from concurrent backends.
  details: |
    Table and index locks are now held until transaction commit when applying changes. This ensures correct serialization and prevents data consistency issues during concurrent operations, specifically addressing risks introduced by parallel apply.
  component: BDR
  jira:  BDR-7730
  addresses: ""
  type: Bug Fix
  impact: Medium  
- relnote: Parallel Apply can now be enabled when PGD is deployed with community Postgres  
  details: |
    Resolved an issue where enabling Parallel Apply on community PostgreSQL caused writer hangs and stuck subscriptions due to frequent lock timeouts. This fix allows Parallel Apply to be used reliably without requiring it to be disabled as a workaround.
  component: BDR
  jira:  BDR-7298
  addresses: "54565, 57005, 57327"
  type: Bug Fix
  impact: Medium
- relnote: Improved the group deletion process to automatically drop associated replication sets.
  details: |
    Enhanced the node group removal logic to automatically drop replication sets of the same name. 
  component: BDR
  jira:  BDR-7033
  addresses: "57531"
  type: Enhancement
  impact: Medium
- relnote: Fixed the in-line help for `pgd group set-option` command.
  details: |
    Corrected the help text for `pgd group set-option` to accurately reflect group-level options.
  component: PGD CLI
  jira:  BDR-7254
  addresses: ""
  type: Bug Fix
  impact: Medium
- relnote: Fixed the matrix view output for the `pgd replication show` command.
  details: |
    Inactive/disconnected slots now display `!` instead of `*` when lag is below 10 MB, restoring consistency.
  jira:  BDR-7623
  component: PGD CLI
  addresses: "56295"
  type: Bug Fix
  impact: Medium
- relnote: Backported TDE options for the `pgd node upgrade` command to PGD 5.
  details: |
    The [pgd node upgrade](/pgd/current/cli/command_ref/node/upgrade) command now supports the `in-place` conversion of a non-TDE PGD node to a TDE-enabled node via the `--key-unwrap-command` and `--copy-by-block` options.
  component: PGD CLI
  jira:  BDR-7588
  addresses: ""
  type: Bug Fix
  impact: Medium
- relnote: Fixed a memory leak in the consensus process when subscriber-only nodes are down.
  details: |
    Resolved a malloc-based memory leak related to the improper freeing of connection strings.
  component: BDR
  jira:  BDR-7650
  addresses: "57094"
  type: Bug Fix
  impact: Medium
- relnote: Fixed a segmentation fault occurring during `COPY` commands when `pgaudit.role` set to a non-default value.
  details: |
    Resolved an issue where Postgres would crash with a segmentation fault when executing a `COPY` command if the `pgaudit.role` configuration was set to a non-default value. 
  component: BDR
  jira:  BDR-7701
  addresses: "58060"
  type: Bug Fix
  impact: Medium
- relnote: Fixed an issue where the `use_https` node group configuration option was ignored.
  details: |
    Resolved a bug where Connection Manager incorrectly ignored the `use_https` setting. When upgrading to PGD 6.3.0 or 5.9.2, you must explicitly enable HTTPS by setting the `use_https` group option to `true` (in addition to having `ssl_cert_file` and `ssl_key_file` configured in `postgresql.conf` or via the command line) before the upgrade to maintain previous behavior.  
  component: BDR
  jira:  BDR-7596
  addresses: ""
  type: Bug Fix
  impact: Medium
- relnote: Improved the consistency of Connection Manager against `pg_hba.conf`.
  details: |
    Enhanced how the Connection Manager matches database names and usernames against `pg_hba.conf` fields. Key improvements include support for `sameuser` matching, refined `samerole` logic, and expanded `+rolename` matching to include the role itself and indirect members. Additionally, quotes are now stripped from usernames before matching to ensure consistent authentication behavior.
  component: BDR  
  jira:  BDR-7376
  addresses: ""
  type: Enhancement
  impact: Medium
- relnote: Fixed a Connection Manager memory leak occurring during configuration reloads.
  details: |
    Resolved a memory leak in the Connection Manager caused by incorrect handling of Postgres memory contexts during configuration reloads.
  component: BDR  
  jira:  BDR-7335
  addresses: ""
  type: Bug Fix
  impact: Medium
- relnote: Added support for user name mapping (`pg_ident.conf`) to the Connection Manager.
  details: |
    This enhancement allows the Connection Manager to use `pg_ident.conf` for user name mapping. Currently, this functionality applies to the `cert` authentication method, aligning Connection Manager behavior with PostgreSQL’s native authentication identity mapping.
  component: BDR  
  jira:  BDR-6735
  addresses: ""
  type: Enhancement
  impact: Medium
- relnote: Fixed a replication crash loop caused by interrupted partition detaching.
  details: |
    Resolved an issue where logical replication would enter an infinite crash loop if a `DETACH PARTITION CONCURRENTLY` command was interrupted. Previously, the walsender would fail with the error `relation has no parent because it's being detached` when decoding WAL for a partition in a `detach-pending` state. 
  component: BDR  
  jira: BDR-7245
  addresses: "53628, 59291"
  type: Bug Fix
  impact: High
- relnote: Fixed a `walsender` crash loop during partition detachment.
  details: |
    Fixed an issue where the `walsender` process could enter a crash loop when encountering partitions with `inhdetachpending = true`, which reported `ERROR: relation %u has no parent failures`.
  component: BDR  
  jira: BDR-7245
  addresses: "53628, 59291"
  type: Bug Fix
  impact: High
- relnote: Fixed proxy configuration loss after `bdr_init_physical`.
  details: |
    Fixed an issue where proxy configurations were not preserved after running `bdr_init_physical` due to Raft snapshot restores failing to persist proxy settings.
  component: BDR  
  jira: BDR-7692
  addresses: "58319"
  type: Bug Fix
  impact: Medium
- relnote: Fixed stale `galloc` sequence allocation entries after `DROP` and `CREATE`.
  details: |
    Fixed a bug where `sequence_alloc` entries persisted after a `galloc` sequence was dropped and recreated. The fix ensures proper cleanup propagation across the cluster, including witness nodes.
  component: BDR  
  jira: BDR-7711
  addresses: ""
  type: Bug Fix
  impact: Medium
- relnote: Fixed `bdr.alter_sequence_set_kind` ignoring start values for `galloc` sequences.
  details: |
    Fixed an issue where changing a sequence kind to `galloc` would silently discard the provided `start_value`. Additionally, resolved a bug where a `startval` of `0` was lost during WAL replication.
  component: BDR  
  jira: BDR-7725
  addresses: ""
  type: Bug Fix
  impact: Medium
- relnote: Updated third-party dependencies to resolve CVE-2026-4427 and address GitHub Dependabot alerts.
  details: |
    Patched internal libraries to address a security vulnerability (CVE-2026-4427). Although the vulnerability does not expose the PGD Proxy directly, a malicious or compromised PostgreSQL server could send a crafted DataRow message to crash the PGD Proxy, resulting in a denial-of-service (DoS).
  component: PGD Proxy  
  jira: BDR-7821
  addresses: ""
  type: Change
  impact: High