<svg viewBox="0 0 790 265" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'Inter','Segoe UI',sans-serif">
  <title>Anatomy of a commit scope</title>
  <desc>A labeled breakdown of bdr.create_commit_scope() showing scope name, which group, who confirms, and how.</desc>

  <rect width="790" height="265" rx="8" fill="#ffffff"/>

  <!-- Code block background -->
  <rect x="20" y="36" width="462" height="170" rx="6" fill="#F4F8F9"/>

  <!-- Line 1 -->
  <text x="36" y="60" font-family="'JetBrains Mono','Fira Code',monospace" font-size="11" fill="#555">SELECT bdr.create_commit_scope(</text>

  <!-- Line 2: commit_scope_name -->
  <text x="52" y="84" font-family="'JetBrains Mono','Fira Code',monospace" font-size="11">
    <tspan fill="#555">commit_scope_name := </tspan><tspan fill="#888">'my_scope'</tspan><tspan fill="#555">,</tspan>
  </text>

  <!-- Line 3: origin_node_group -->
  <text x="52" y="108" font-family="'JetBrains Mono','Fira Code',monospace" font-size="11">
    <tspan fill="#555">origin_node_group := </tspan><tspan fill="#136A7F">'my_group'</tspan><tspan fill="#555">,</tspan>
  </text>

  <!-- Line 4: rule -->
  <text x="52" y="132" font-family="'JetBrains Mono','Fira Code',monospace" font-size="11">
    <tspan fill="#555">rule := '</tspan><tspan fill="#429D9E">MAJORITY ORIGIN GROUP</tspan><tspan fill="#F89E5D"> SYNCHRONOUS COMMIT</tspan><tspan fill="#555">',</tspan>
  </text>

  <!-- Line 5: wait_for_ready -->
  <text x="52" y="156" font-family="'JetBrains Mono','Fira Code',monospace" font-size="11" fill="#555">    wait_for_ready := true</text>

  <!-- Line 6: ); -->
  <text x="36" y="180" font-family="'JetBrains Mono','Fira Code',monospace" font-size="11" fill="#555">);</text>

  <!-- Callout boxes -->

  <!-- Box 1: scope name (neutral) -->
  <rect x="512" y="52" width="260" height="40" rx="6" fill="#F4F8F9" stroke="#888" stroke-width="1.5"/>
  <text x="524" y="68" font-size="11" font-weight="600" fill="#888">Scope name</text>
  <text x="524" y="83" font-size="10" fill="#555">commit_scope_name</text>

  <!-- Box 2: which group? (dark teal) -->
  <rect x="512" y="104" width="260" height="40" rx="6" fill="#F4F8F9" stroke="#136A7F" stroke-width="1.5"/>
  <text x="524" y="120" font-size="11" font-weight="600" fill="#136A7F">Which group?</text>
  <text x="524" y="135" font-size="10" fill="#555">origin_node_group</text>

  <!-- Box 3: who confirms? (mid teal) -->
  <rect x="512" y="156" width="260" height="40" rx="6" fill="#F4F8F9" stroke="#429D9E" stroke-width="1.5"/>
  <text x="524" y="172" font-size="11" font-weight="600" fill="#429D9E">Who confirms?</text>
  <text x="524" y="187" font-size="10" fill="#555">commit scope group specifier</text>

  <!-- Box 4: how? (amber) -->
  <rect x="512" y="208" width="260" height="40" rx="6" fill="#F4F8F9" stroke="#F89E5D" stroke-width="1.5"/>
  <text x="524" y="224" font-size="11" font-weight="600" fill="#F89E5D">How?</text>
  <text x="524" y="239" font-size="10" fill="#555">Commit kind</text>

</svg>
