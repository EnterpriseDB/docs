<svg viewBox="0 0 506 100" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'Inter','Segoe UI',sans-serif">
  <title>Commit scope: which group plus a combination of who confirms and how pairs joined by AND</title>
  <desc>Which group is fixed. A plus sign leads into parentheses containing two who-confirms and how pairs joined by AND.</desc>

  <rect width="506" height="100" rx="10" fill="#F6F9FA"/>

  <!-- Which group? -->
  <rect x="12" y="24" width="76" height="52" rx="7" fill="#136A7F"/>
  <text x="50" y="44" text-anchor="middle" dominant-baseline="central" font-size="9" font-weight="600" fill="#ffffff">which</text>
  <text x="50" y="57" text-anchor="middle" dominant-baseline="central" font-size="9" font-weight="600" fill="#ffffff">group?</text>

  <!-- + -->
  <text x="97" y="50" text-anchor="middle" dominant-baseline="central" font-size="16" fill="#C8D8DC">+</text>

  <!-- Opening parenthesis -->
  <text x="114" y="50" text-anchor="middle" dominant-baseline="central" font-size="36" fill="#9BBFC6" font-weight="200">(</text>

  <!-- Clause 1 -->
  <rect x="128" y="24" width="72" height="52" rx="7" fill="#429D9E"/>
  <text x="164" y="44" text-anchor="middle" dominant-baseline="central" font-size="9" font-weight="600" fill="#ffffff">who</text>
  <text x="164" y="57" text-anchor="middle" dominant-baseline="central" font-size="9" font-weight="600" fill="#ffffff">confirms?</text>

  <text x="206" y="50" text-anchor="middle" dominant-baseline="central" font-size="16" fill="#C8D8DC">+</text>

  <rect x="214" y="24" width="60" height="52" rx="7" fill="#F89E5D"/>
  <text x="244" y="50" text-anchor="middle" dominant-baseline="central" font-size="9" font-weight="600" fill="#ffffff">how?</text>

  <!-- AND badge -->
  <rect x="284" y="38" width="36" height="24" rx="5" fill="#555555"/>
  <text x="302" y="50" text-anchor="middle" dominant-baseline="central" font-size="10" font-weight="700" fill="#ffffff">AND</text>

  <!-- Clause 2 -->
  <rect x="330" y="24" width="72" height="52" rx="7" fill="#429D9E"/>
  <text x="366" y="44" text-anchor="middle" dominant-baseline="central" font-size="9" font-weight="600" fill="#ffffff">who</text>
  <text x="366" y="57" text-anchor="middle" dominant-baseline="central" font-size="9" font-weight="600" fill="#ffffff">confirms?</text>

  <text x="408" y="50" text-anchor="middle" dominant-baseline="central" font-size="16" fill="#C8D8DC">+</text>

  <rect x="416" y="24" width="60" height="52" rx="7" fill="#F89E5D"/>
  <text x="446" y="50" text-anchor="middle" dominant-baseline="central" font-size="9" font-weight="600" fill="#ffffff">how?</text>

  <!-- Closing parenthesis -->
  <text x="488" y="50" text-anchor="middle" dominant-baseline="central" font-size="36" fill="#9BBFC6" font-weight="200">)</text>

</svg>
