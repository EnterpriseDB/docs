<svg viewBox="0 0 480 336" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'Inter', 'Segoe UI', sans-serif" font-size="13">
  <title>Commit scope topology: MAJORITY ORIGIN GROUP SYNCHRONOUS COMMIT AND ANY 1 NOT ORIGIN GROUP SYNCHRONOUS COMMIT DEGRADE ON</title>
  <desc>Two active data groups, each with an app client, and a witness. The amber selection spans A2 and B2 across regions as the cross-region clause. The red outline covers A2 and A3 as the local majority. A2 appears in both selections as the origin node. A solid amber arrow with a 10-second degrade fallback connects A2 to B2.</desc>
  <style>
    .svg-bg      { fill: #ffffff; }
    .reg-on      { fill: #F4F8F9; stroke: #136A7F; stroke-width: 1.5; }
    .reg-wit     { fill: #F4F8F9; stroke: #CCC; stroke-width: 1.5; stroke-dasharray: 5 3; }
    .node-in     { fill: #136A7F; stroke: none; }
    .node-lead   { fill: #136A7F; stroke: #0A3D4F; stroke-width: 3; }
    .node-out    { fill: #E8F2F3; stroke: #CCC; stroke-width: 1.5; }
    .node-cw     { fill: #F4F8F9; stroke: #CCC; stroke-width: 1.5; stroke-dasharray: 3 2; }
    .lbl-on      { fill: #136A7F; font-size: 11px; font-weight: 700; }
    .lbl-off     { fill: #888; font-size: 11px; font-weight: 700; }
    .lbl-sub     { fill: #AAA; font-size: 10px; }
    .t-in        { fill: #ffffff; font-size: 12px; font-weight: 600; }
    .t-wl        { fill: rgba(255,255,255,0.7); font-size: 8px; }
    .t-out       { fill: #AAA; font-size: 12px; }
    .t-cw        { fill: #BBB; font-size: 11px; }
    .app-box     { fill: #E8F2F3; stroke: #429D9E; stroke-width: 1.5; }
    .app-txt     { fill: #429D9E; font-size: 11px; font-weight: 600; }
    .app-ln      { stroke: #429D9E; stroke-width: 1.5; stroke-dasharray: 4 3; fill: none; }
    .async       { stroke: #DDD; stroke-width: 1.5; stroke-dasharray: 4 3; }
    .deg-box     { fill: #ffffff; stroke: #F89E5D; stroke-width: 1.2; }
    .deg-txt     { fill: #C86E3A; font-size: 8px; font-weight: 600; }
    .leg-txt     { fill: #666; font-size: 10px; }
  </style>

  <rect width="480" height="336" rx="8" class="svg-bg"/>

  <!-- App A — left of Region A, level with A2 -->
  <rect x="6" y="105" width="52" height="24" rx="5" class="app-box"/>
  <text x="32" y="121" text-anchor="middle" class="app-txt">App</text>

  <!-- Region A (active) — nodes centered at x=86, text-anchor x=144 -->
  <rect x="66" y="28" width="155" height="195" rx="8" class="reg-on"/>
  <text x="143" y="48" text-anchor="middle" class="lbl-on">Region A (DC1)</text>

  <!-- Region B (active) — nodes centered at x=279, text-anchor x=337 -->
  <rect x="259" y="28" width="155" height="195" rx="8" class="reg-on"/>
  <text x="336" y="48" text-anchor="middle" class="lbl-on">Region B (DC2)</text>

  <!-- Amber selection: spans A2 → gap → B2 (cross-region clause, drawn over region fills) -->
  <rect x="80" y="96" width="321" height="42" rx="6" fill="#FFF5EE" stroke="#F89E5D" stroke-width="2" stroke-dasharray="6 3"/>

  <!-- Red selection: A2 + A3 (local clause, outline only so amber shows through at A2) -->
  <rect x="80" y="96" width="128" height="84" rx="7" fill="none" stroke="#CC4040" stroke-width="2" stroke-dasharray="6 3"/>

  <!-- A1 not required -->
  <rect x="86" y="58" width="116" height="34" rx="6" class="node-out"/>
  <text x="144" y="78" text-anchor="middle" class="t-out">A1</text>

  <!-- A2 write leader — origin node, in both selections -->
  <rect x="86" y="100" width="116" height="34" rx="6" class="node-lead"/>
  <text x="144" y="116" text-anchor="middle" class="t-in">A2</text>
  <text x="144" y="127" text-anchor="middle" class="t-wl">write leader</text>

  <!-- A3 in local clause only -->
  <rect x="86" y="142" width="116" height="34" rx="6" class="node-in"/>
  <text x="144" y="163" text-anchor="middle" class="t-in">A3</text>

  <!-- App A → A2 write connection -->
  <line x1="58" y1="117" x2="80" y2="117" class="app-ln"/>
  <polygon points="76,113 86,117 76,121" fill="#429D9E"/>

  <!-- B1 not in scope -->
  <rect x="279" y="58" width="116" height="34" rx="6" class="node-out"/>
  <text x="337" y="78" text-anchor="middle" class="t-out">B1</text>

  <!-- B2 in cross-region clause -->
  <rect x="279" y="100" width="116" height="34" rx="6" class="node-in"/>
  <text x="337" y="120" text-anchor="middle" class="t-in">B2</text>

  <!-- B3 not in scope -->
  <rect x="279" y="142" width="116" height="34" rx="6" class="node-out"/>
  <text x="337" y="163" text-anchor="middle" class="t-out">B3</text>

  <!-- App B — right of Region B, level with B2 -->
  <rect x="422" y="105" width="52" height="24" rx="5" class="app-box"/>
  <text x="448" y="121" text-anchor="middle" class="app-txt">App</text>

  <!-- App B → B2 write connection (pointing left) -->
  <line x1="422" y1="117" x2="405" y2="117" class="app-ln"/>
  <polygon points="405,113 395,117 405,121" fill="#429D9E"/>

  <!-- Cross-region arrow A2 → B2 (solid amber, synchronous with degrade fallback) -->
  <line x1="202" y1="117" x2="273" y2="117" stroke="#F89E5D" stroke-width="2"/>
  <polygon points="269,113 279,117 269,121" fill="#F89E5D"/>
  <rect x="214" y="101" width="52" height="14" rx="4" class="deg-box"/>
  <text x="240" y="111" text-anchor="middle" class="deg-txt">degrade 10s</text>

  <!-- Async to witness -->
  <line x1="144" y1="223" x2="200" y2="237" class="async"/>
  <line x1="336" y1="223" x2="280" y2="237" class="async"/>

  <!-- Region C witness — centered -->
  <rect x="175" y="237" width="130" height="62" rx="8" class="reg-wit"/>
  <text x="240" y="257" text-anchor="middle" class="lbl-off">Region C</text>
  <text x="240" y="270" text-anchor="middle" class="lbl-sub">(Witness)</text>
  <rect x="207" y="273" width="66" height="24" rx="5" class="node-cw"/>
  <text x="240" y="289" text-anchor="middle" class="t-cw">CW</text>

  <!-- Legend — centered across 480px viewBox -->
  <rect x="54" y="310" width="10" height="10" rx="2" class="node-in"/>
  <text x="68" y="319" class="leg-txt">Confirms commit</text>
  <rect x="172" y="310" width="10" height="10" rx="2" fill="#FFF0F0" stroke="#CC4040" stroke-width="1.5"/>
  <text x="186" y="319" class="leg-txt">Local selection</text>
  <rect x="290" y="310" width="10" height="10" rx="2" fill="#FFF5EE" stroke="#F89E5D" stroke-width="1.5"/>
  <text x="304" y="319" class="leg-txt">Cross-region selection</text>
</svg>
