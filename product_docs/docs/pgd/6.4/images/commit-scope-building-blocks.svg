<svg viewBox="0 0 460 118" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'Inter','Segoe UI',sans-serif">
  <title>Commit scope building blocks: which group? + who confirms? + how?</title>
  <desc>A commit scope is composed of three building blocks: which group, who confirms, and how.</desc>

  <rect width="460" height="118" rx="10" fill="#F6F9FA"/>

  <!-- commit scope box — y=28, h=36, center at y=46 -->
  <rect x="12" y="28" width="92" height="36" rx="7" fill="#ffffff" stroke="#136A7F" stroke-width="1.5"/>
  <text x="58" y="46" text-anchor="middle" dominant-baseline="central" font-size="11" font-weight="700" fill="#136A7F">commit scope</text>

  <!-- = -->
  <text x="115" y="46" text-anchor="middle" dominant-baseline="central" font-size="18" fill="#C8D8DC" font-weight="300">=</text>

  <!-- Block A: which group? -->
  <rect x="126" y="28" width="86" height="36" rx="7" fill="#136A7F"/>
  <text x="169" y="46" text-anchor="middle" dominant-baseline="central" font-size="11" font-weight="600" fill="#ffffff">which group?</text>

  <!-- + -->
  <text x="222" y="46" text-anchor="middle" dominant-baseline="central" font-size="16" fill="#C8D8DC" font-weight="300">+</text>

  <!-- Block B: who confirms? -->
  <rect x="232" y="28" width="112" height="36" rx="7" fill="#429D9E"/>
  <text x="288" y="46" text-anchor="middle" dominant-baseline="central" font-size="11" font-weight="600" fill="#ffffff">who confirms?</text>

  <!-- + -->
  <text x="354" y="46" text-anchor="middle" dominant-baseline="central" font-size="16" fill="#C8D8DC" font-weight="300">+</text>

  <!-- Block C: how? -->
  <rect x="364" y="28" width="84" height="36" rx="7" fill="#F89E5D"/>
  <text x="406" y="46" text-anchor="middle" dominant-baseline="central" font-size="11" font-weight="600" fill="#ffffff">how?</text>

  <!-- Tick lines -->
  <line x1="169" y1="64" x2="169" y2="72" stroke="#C8D8DC" stroke-width="1"/>
  <line x1="288" y1="64" x2="288" y2="72" stroke="#C8D8DC" stroke-width="1"/>
  <line x1="406" y1="64" x2="406" y2="72" stroke="#C8D8DC" stroke-width="1"/>

  <!-- Sublabels -->
  <text x="169" y="81" text-anchor="middle" font-size="9" fill="#888">the group the scope</text>
  <text x="169" y="93" text-anchor="middle" font-size="9" fill="#888">applies to</text>

  <text x="288" y="81" text-anchor="middle" font-size="9" fill="#888">which nodes must confirm</text>
  <text x="288" y="93" text-anchor="middle" font-size="9" fill="#888">and how many</text>

  <text x="406" y="81" text-anchor="middle" font-size="9" fill="#888">type of</text>
  <text x="406" y="93" text-anchor="middle" font-size="9" fill="#888">confirmation</text>
</svg>
