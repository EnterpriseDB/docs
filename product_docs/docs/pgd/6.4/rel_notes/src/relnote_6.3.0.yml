# yaml-language-server: $schema=https://raw.githubusercontent.com/EnterpriseDB/docs/refs/heads/develop/tools/automation/generators/relgen/relnote-schema.json
product: EDB Postgres Distributed
version: 6.3.0
date:  26 March 2026
intro: |
  EDB Postgres Distributed (PGD) 6.3.0 includes new features, enhancements, and bug fixes focused on improving stability and reliability.
highlights: |
  - **Connection Manager on subscriber-only nodes:** Connection Manager now starts by default on subscriber-only nodes, providing access to advanced connection pooling and session management features. It also re-routes all read-only traffic to the local node to reduce latency.
  - **Consensus management via PGD CLI:** The PGD CLI now includes commands to enable or disable Raft consensus on specific nodes or groups. The commands [pgd raft enable](/pgd/current/reference/cli/command_ref/raft/enable) and [pgd raft disable](/pgd/current/reference/cli/command_ref/raft/disable) provide granular control over node behavior.
  - **Platform support update:** PGD is now supported on SUSE Linux Enterprise Server (SLES) 15 SP7 beginning with 6.3.0.

relnotes:
- relnote: Added the [pgd raft set-leader](/pgd/current/reference/cli/command_ref/raft/set-leader) command. 
  details: |
    Introduced the `pgd raft set-leader` command, allowing users to manually change the Raft leader for a specific group.
  jira:  BDR-7645
  addresses: ""
  type: Feature
  impact: Medium
- relnote: Added [pgd raft enable](/pgd/current/reference/cli/command_ref/raft/enable) and [pgd raft disable](/pgd/current/reference/cli/command_ref/raft/disable) commands.
  details: |
    Added commands to enable or disable consensus (Raft) across different nodes, groups, or cluster levels.
  jira:  BDR-7669
  addresses: ""
  type: Feature
  impact: Medium
- relnote: Improved the group deletion process to automatically drop associated replication sets.
  details: |
    Enhanced the node group removal logic to automatically drop replication sets of the same name. 
  jira:  BDR-7033
  addresses: "57531"
  type: Enhancement
  impact: Medium
- relnote: Fixed encoding charset issue with `pgd setup` command.
  details: |
    The command now attempts to fetch the encoding value directly from the remote node, defaulting to UTF8 if unavailable.
  jira:  BDR-7297
  addresses: ""
  type: Bug Fix
  impact: Medium
- relnote: Fixed the in-line help for the `pgd group set-option` command.
  details: |
    Corrected the help text for `pgd group set-option` to accurately reflect group-level options.
  jira:  BDR-7254
  addresses: ""
  type: Bug Fix
  impact: Medium
- relnote: Fixed the matrix view output for the `pgd replication show` command.
  details: |
    Inactive/disconnected slots now display `!` instead of `*` when lag is below 10 MB, restoring consistency.
  jira:  BDR-7623
  addresses: "56295"
  type: Bug Fix
  impact: Medium
- relnote: Fixed a memory growth in the consensus shared memory queue.
  details: |
    Prevented shared memory queues used by consensus from growing while a node is unreachable, ensuring that memory remains stable during node outages.
  jira:  BDR-7674
  addresses: ""
  type: Bug Fix
  impact: Medium
- relnote: Fixed a memory leak in the consensus process when subscriber-only nodes are down.
  details: |
    Resolved a malloc-based memory leak related to the improper freeing of connection strings.
  jira:  BDR-7650
  addresses: "57094"
  type: Bug Fix
  impact: Medium
- relnote: Fixed an issue where the `use_https` node group configuration option was ignored.
  details: |
    Resolved a bug where Connection Manager incorrectly ignored the `use_https` setting. When upgrading to PGD 6.3.0 or 5.9.2, you must explicitly enable HTTPS by setting the `use_https` group option to `true` (in addition to having `ssl_cert_file` and `ssl_key_file` configured in `postgresql.conf` or via the command line) before the upgrade to maintain previous behavior.  
  jira:  BDR-7596
  addresses: ""
  type: Bug Fix
  impact: Medium
- relnote: Fixed a Connection Manager memory leak occurring during configuration reloads.
  details: |
    Resolved a memory leak in the Connection Manager caused by incorrect handling of Postgres memory contexts during configuration reloads.
  jira:  BDR-7335
  addresses: ""
  type: Bug Fix
  impact: Medium
- relnote: Improved the consistency of Connection Manager against `pg_hba.conf`.
  details: |
    Enhanced how the Connection Manager matches database names and usernames against `pg_hba.conf` fields. Key improvements include support for `sameuser` matching, refined `samerole` logic, and expanded `+rolename` matching to include the role itself and indirect members. Additionally, quotes are now stripped from usernames before matching to ensure consistent authentication behavior.
  jira:  BDR-7376
  addresses: ""
  type: Enhancement
  impact: Medium
- relnote: Added support for user name mapping (`pg_ident.conf`) to the Connection Manager.
  details: |
    This enhancement allows the Connection Manager to use `pg_ident.conf` for user name mapping. Currently, this functionality applies to the `cert` authentication method, aligning Connection Manager behavior with PostgreSQL’s native authentication identity mapping.
  jira:  BDR-6735
  addresses: ""
  type: Enhancement
  impact: Medium
- relnote: Fixed a segmentation fault occurring during `COPY` commands when `pgaudit.role` is set to a non-default value.
  details: |
    Resolved an issue where Postgres would crash with a segmentation fault when executing a `COPY` command if the `pgaudit.role` configuration was set to a non-default value. 
  jira:  BDR-7701
  addresses: "58060"
  type: Bug Fix
  impact: Medium
- relnote: Improved the `bdr.reconcile_2pc_requests` table and added the view `bdr.reconcile_2pc_requests_summary`.
  details: |
    Enhanced [bdr.reconcile_2pc_requests](/pgd/current/reference/tables-views-functions/catalogs-internal#bdrreconcile_2pc_requests) to include more details such as request time, origin LSN, and commit timestamp. Additionally, added a user-friendly view, [bdr.reconcile_2pc_requests_summary](/pgd/current/reference/tables-views-functions/catalogs-internal#bdrreconcile_2pc_requests_summary), to simplify monitoring of Two-Phase Commit (2PC) reconciliation.
  jira:  BDR-7361
  addresses: ""
  type: Enhancement
  impact: Medium
- relnote: Fixed an issue where setting `retention_period` and `analytics_offload_period` simultaneously on AutoPartition tables caused conflicts.
  details: |
    Improved the coordination between data retention and analytics offloading. Partitions are now offloaded using Postgres Analytics Accelerator (PGAA) before the data retention policy is applied.
  jira:  BDR-7235
  addresses: ""
  type: Bug Fix
  impact: Medium
- relnote: Fixed an issue with the analytics replicator, which could cause redundant replication processes.
  details: |
    In cluster topologies with subgroups and analytics enabled in the parent group, a bug caused each subgroup's write leader to start its own analytics replicator instance, resulting in duplicate rows. This fix ensures that only one analytics replicator per PGD group runs across the cluster.
  jira:  BDR-7542
  addresses: ""
  type: Bug Fix
  impact: Medium
- relnote: Fixed an infinite loop in the Connection Manager that occurred when a server connection was unexpectedly closed.
  details: |
    Resolved a race condition in the Connection Manager where an unexpected server disconnection during the retrieval process from a connection pool would trigger an infinite loop. This issue was specifically limited to clusters operating in session pooling mode.
  jira:  BDR-7802
  addresses: ""
  type: Bug Fix
  impact: Medium
- relnote: Improved lock handling during change application to prevent data corruption from concurrent backends.
  details: |
    Table and index locks are now held until transaction commit when applying changes. This ensures correct serialization and prevents data consistency issues during concurrent operations, specifically addressing risks introduced by parallel apply.
  jira:  BDR-7730
  addresses: ""
  type: Bug Fix
  impact: Medium
- relnote: Parallel Apply can now be enabled when PGD is deployed with community Postgres.  
  details: |
    Resolved an issue where enabling Parallel Apply on community PostgreSQL caused writer hangs and stuck subscriptions due to frequent lock timeouts. This fix allows Parallel Apply to be used reliably without requiring it to be disabled as a workaround.
  jira:  BDR-7298
  addresses: "54565, 57005, 57327"
  type: Bug Fix
  impact: Medium
- relnote: Standalone macOS PGD CLI is now ARM64 only.
  details: |
    The standalone PGD CLI for macOS is now available exclusively for the Apple Silicon (ARM64) architecture. This change applies only to the standalone macOS binary; the availability and support for standalone PGD CLI binaries on GNU/Linux remain unchanged.
  jira: 
  type: Change
  impact: Low
- relnote: Improved conflict handling for origin changes in group commit.
  details: |
    Enhanced group commit to perform eager conflict detection and resolution when the origin of a transaction changes. Conflict handling now relies on timestamp-based detection rather than replication-progress speculation. To ensure optimal performance and avoid increased commit latency, you must synchronize system clocks across all nodes.
  jira: BDR-7509
  type: Enhancement
  impact: Medium
- relnote: Added the `bdr.stat_reconcile_commit_scope` view for improved monitoring.
  details: |
    Introduced a new system view, [bdr.stat_reconcile_commit_scope](/pgd/current/reference/tables-views-functions/catalogs-visible#bdrstat_reconcile_commit_scope), which provides real-time statistics for commit scope reconciliation.
  jira: BDR-7362
  type: Enhancement
  impact: Medium
- relnote: Improved write leader election logic via two new `bdr.node_group_config` options.
  details: |
    Introduced new options for [bdr.node_group_config](/pgd/current/reference/tables-views-functions/catalogs-internal#bdrnode_group_config), which allow the cluster to select the most advanced candidate replica during leader transitions:
    - `leader_progress_tracking_enable`: Periodically reports replication progress to the Raft leader.
    - `leader_progress_tracking_period`: Configures the reporting interval.
  jira: BDR-7047
  type: Enhancement
  impact: Medium
- relnote: Fixed a replication crash loop caused by interrupted partition detaching.
  details: |
    Resolved an issue where logical replication would enter an infinite crash loop if a `DETACH PARTITION CONCURRENTLY` command was interrupted. Previously, the walsender would fail with the error `relation has no parent because it's being detached` when decoding WAL for a partition in a `detach-pending` state. 
  jira: BDR-7245
  addresses: "53628, 59291"
  type: Bug Fix
  impact: High
- relnote: Added support for `ALTER SEQUENCE` ... `RENAME` and `ALTER SEQUENCE` ... `SET SCHEMA` for `galloc` sequences.
  details: |
    Renaming `galloc` sequences or moving them between schemas is now fully supported. This is enabled by a global UUID identifier (`sequuid`) in the `bdr.sequence_kind` catalog, which allows PGD to track these sequences consistently and concurrently. This functionality works even for sequences upgraded from versions prior to PGD 6.3, as PGD automatically generates the required UUIDs for existing sequences to ensure compatibility.
  jira: BDR-7123
  addresses: ""
  type: Enhancement
  impact: Medium
- relnote: Added the `bdr.prepared_xacts_summary` diagnostic view.
  details: |
    Introduced [bdr.prepared_xacts_summary](/pgd/current/reference/tables-views-functions/catalogs-internal#bdrprepared_xacts_summary), a local diagnostic view for monitoring prepared transactions implicitly created by group commit scopes. 
  jira: BDR-7363
  addresses: ""
  type: Enhancement
  impact: Medium
- relnote: Improved Connection Manager resilience during file descriptor exhaustion.
  details: |
    Connection Manager now automatically recovers from file descriptor exhaustion. If the system limit is reached, the process will close listening sockets and automatically restart after 30 seconds to restore connectivity.
  jira: BDR-7334
  addresses: ""
  type: Bug Fix
  impact: Medium
- relnote: Fixed a `walsender` crash loop during partition detachment.
  details: |
    Fixed an issue where the `walsender` process could enter a crash loop when encountering partitions with `inhdetachpending = true`, which reported `ERROR: relation %u has no parent failures`.
  jira: BDR-7245
  addresses: "53628, 59291"
  type: Bug Fix
  impact: High
- relnote: Fixed false error reporting during node group creation.
  details: |
    Resolved a race condition where `bdr.create_node_group` could return an error even if the group was successfully created. The function now correctly waits for node creation to fully complete before returning.
  jira: BDR-7609
  addresses: ""
  type: Bug Fix
  impact: Medium
- relnote: Fixed proxy configuration loss after `bdr_init_physical`.
  details: |
    Fixed an issue where proxy configurations were not preserved after running `bdr_init_physical` due to Raft snapshot restores failing to persist proxy settings.
  jira: BDR-7692
  addresses: "58319"
  type: Bug Fix
  impact: Medium
- relnote: Fixed stale `galloc` sequence allocation entries after `DROP` and `CREATE`.
  details: |
    Fixed a bug where `sequence_alloc` entries persisted after a `galloc` sequence was dropped and recreated. The fix ensures proper cleanup propagation across the cluster, including witness nodes.
  jira: BDR-7711
  addresses: ""
  type: Bug Fix
  impact: Medium
- relnote: Fixed `bdr.alter_sequence_set_kind` ignoring start values for `galloc` sequences.
  details: |
    Fixed an issue where changing a sequence kind to `galloc` would silently discard the provided `start_value`. Additionally, resolved a bug where a `startval` of `0` was lost during WAL replication.
  jira: BDR-7725
  addresses: ""
  type: Bug Fix
  impact: Medium
- relnote: Connection Manager starts by default on subscriber-only nodes and includes new health check endpoints.
  details: |
    Connection Manager now initializes automatically on subscriber-only nodes. This release also adds the `/connection/is-ready-ro` and `/connection/is-ready-rw` HTTP endpoints to provide granular readiness checks for read-only and read-write traffic.
  jira: BDR-7725
  addresses: ""
  type: Feature
  impact: High
- relnote: Prevented duplicate data replication during analytics write leader transitions.
  details: |
    Fixed an issue where the analytics replicator on a previous write leader could continue running simultaneously with the replicator on the new leader. This synchronization improvement ensures the old process stops completely before the new one initializes, preventing duplicate data inserts. This fix includes the addition of the [bdr.group_lease](/pgd/current/reference/tables-views-functions/catalogs-visible#bdrgroup_lease) catalog table and the [bdr.group_lease_override](/pgd/current/reference/tables-views-functions/functions#bdrgroup_lease_override) function.
  jira: BDR-7366
  addresses: ""
  type: Bug Fix
  impact: Medium
- relnote: Fixed `ALTER ROLE` replication failures.
  details: |
    Fixed an issue where replication would break because attributes like `NOSUPERUSER` or `NOREPLICATION` were automatically added to the replicated command. Since these options can only be altered by a superuser, the apply process failed on downstream nodes. This change ensures the replicated command only includes options that were explicitly specified and for which the user has sufficient privileges.
  jira: BDR-7590
  addresses: "54906"
  type: Bug Fix
  impact: High
- relnote: Made `bdr.max_writers_per_subscription` runtime-reloadable.
  details: |
    `bdr.max_writers_per_subscription` is now `PGC_SIGHUP`: change the value with `ALTER SYSTEM` followed by `pg_reload_conf()` — no node restart is required. The value is captured by each writer group at initialization, so an in-flight subscription continues with the value it was started with; the new limit takes effect on the next writer-group start (subscription disable/enable, or the next reconnect cycle).
  jira: BDR-7474
  addresses: ""
  type: Enhancement
  impact: Low