# yaml-language-server: $schema=https://raw.githubusercontent.com/EnterpriseDB/docs/refs/heads/develop/tools/automation/generators/relgen/relnote-schema.json
product: EDB Postgres Distributed
version: 6.4.0
date: 21 May 2026
intro: |
  EDB Postgres Distributed (PGD) 6.4.0 includes new features, enhancements, and bug fixes.
highlights: |
  - **Quorum Commit:** PGD now supports a consensus-based commit protocol that requires majority agreement across the cluster before a transaction is finalized. Unlike standard synchronous replication, Quorum Commit rolls back the transaction if the cluster can't reach consensus, ensuring a transaction either commits globally or doesn't commit at all.
  - **Connection Manager connection pooling:** Connection Manager now includes built-in connection pooling, removing the need for a separate pooler such as pgBouncer in most deployments. Pooling reduces the number of backend connections by sharing them across many client connections, lowering memory and process overhead on the database server.

relnotes:
- relnote: Added configurable apply error policy for handling replication failures.
  details: |
    PGD now provides a configurable policy for handling replication apply failures. When a transaction fails to apply, PGD can capture the failed changes and let you resolve them using new SQL functions: `bdr.skip_failed_change`, `bdr.skip_failed_transaction`, `bdr.apply_failed_change`, `bdr.modify_failed_change`, and `bdr.resolve_failed_transaction`. The policy is configured per node group using the `apply_error_policy`, `apply_error_max_retries`, `apply_error_max_skips`, and `apply_error_max_record_size` options in `bdr.alter_node_group_option`.
  jira: BDR-7604
  addresses: ""
  type: Feature
  impact: High
- relnote: Added support for logically replicated large objects.
  details: |
    PGD now provides its own implementation of large objects as a drop-in replacement for the built-in Postgres large objects. PGD large objects are logically replicated across all nodes in the cluster. The feature is available via `bdr.lo_` functions directly, or transparently via `bdr.override_large_objects`.
  jira: BDR-7837
  addresses: ""
  type: Feature
  impact: High
- relnote: Parallel apply is now compatible with Quorum Commit.
  details: |
    Unlike Group Commit, Quorum Commit is compatible with parallel apply. Quorum Commit improves on legacy Group Commit, which was only supported with `num_writers = 1`.
  jira: BDR-2271
  addresses: ""
  type: Enhancement
  impact: Medium
- relnote: Added the `pgd raft sync-snapshot` command to synchronize Raft state.
  details: |
    New command that synchronizes the Raft state across all nodes by disabling Raft, exporting state from the leader node, importing it on all nodes, and re-enabling Raft. Use `--group` to specify a target group; defaults to global group.
  jira: BDR-7748
  addresses: ""
  type: Feature
  impact: Medium
- relnote: Enhanced the `pgd raft show` command to display more information.
  details: |
    The command now displays three sections by default to provide deeper visibility into the Raft consensus layer: State (consensus state), Followers (follower status as seen from the leader), and Journal (global journal details).
  jira: BDR-7580
  addresses: ""
  type: Enhancement
  impact: Medium
- relnote: Connection Manager now respects `IntervalStyle` specified in connection startup parameters.
  details: |
    Previously, `IntervalStyle` was only supported via the `options` connection parameter. Connection Manager now correctly applies `IntervalStyle` when specified directly as a startup parameter.
  jira: BDR-7775
  addresses: ""
  type: Enhancement
  impact: Medium
- relnote: Improved Connection Manager idle connection handling on topology and configuration changes.
  details: |
    Connection Manager now closes outdated idle connections protectively when topology or configuration changes occur, instead of waiting for the idle timeout. Connection Manager now reports server connection errors directly to the client instead of using a global shared variable.
  jira: BDR-7923
  addresses: ""
  type: Enhancement
  impact: Medium
- relnote: Added per-subgroup connection string support via `node_group_dsn`.
  details: |
    A new `node_group_dsn` column in `bdr.node_config` lets nodes within the same subgroup use a dedicated connection string, useful in Kubernetes and cloud environments to reduce egress costs. Set it via `bdr.alter_node_option`.
  jira: BDR-6055
  addresses: ""
  type: Enhancement
  impact: Medium
- relnote: Fixed zero OID assigned to tablespaces during logical join sync.
  details: |
    `bdr_tablespace_upsert()` was not setting the OID when inserting a new tablespace, causing a duplicate key violation when multiple user tablespaces were synced during logical join.
  jira: BDR-7886
  addresses: "59715"
  type: Bug Fix
  impact: High
- relnote: Fixed `pgd assess` command failing on Postgres instances without BDR extension.
  details: |
    The `pgd assess` command was failing with `ERROR: schema "bdr" does not exist`. The command now gracefully handles instances without BDR installed by checking for the BDR schema first, and performs the full assessment with compatibility suggestions for both PGD Essential and Expanded editions.
  jira: BDR-7834
  addresses: ""
  type: Bug Fix
  impact: High
- relnote: Fixed system OID assignment in `pgd node setup` causing upgrade failures.
  details: |
    `pgd node setup` was creating BDR objects with system-range OIDs, causing `pgd node upgrade` to fail with `schema "bdr" does not exist`. The setup command now assigns user-range OIDs correctly, and the upgrade command detects the issue early on existing affected clusters.
  jira: BDR-7423
  addresses: ""
  type: Bug Fix
  impact: Medium
- relnote: Fixed a memory leak in the walsender for the temporary replication slot used by joining nodes.
  details: |
    Fixed a memory leak in `bdr_copy_to_repl_dest_receiver_receive`, where per-row allocations in the walsender for the temporary replication slot used by joining nodes were not freed correctly.
  jira: BDR-7989
  addresses: "59663"
  type: Bug Fix
  impact: High
- relnote: Added `bdr.routing_leadership_transfer` to transfer write leadership to another node.
  details: |
    Transfers write leadership to a specified node, or automatically selects the most appropriate candidate when `leader_name` is `NULL`.
  jira: BDR-7800
  addresses: ""
  type: Feature
  impact: Medium
- relnote: Added `bdr.transfer_all_leaderships` to transfer write and Raft leadership away from the local node.
  details: |
    Transfers write and Raft leadership away from the local node across all groups, useful for draining a node before maintenance.
  jira: BDR-7693
  addresses: ""
  type: Feature
  impact: Low
- relnote: Fixed upgrade failures from PGD 6.2 to 6.3 or 6.4 when `pgaudit` follows `bdr` in `shared_preload_libraries`.
  details: |
    When `pgaudit` followed `bdr` in `shared_preload_libraries`, upgrades from PGD 6.2 failed with `ERROR: pgaudit not loaded before call to pgaudit_ddl_command_end()`. Hook deinitialization was resetting hooks to `NULL`, crashing pgaudit in the manager process. The fix adds bypass macros so hooks defer to the next handler instead of deinitializing.
  jira: BDR-7875
  addresses: "59715"
  type: Bug Fix
  impact: Medium
- relnote: Fixed pglogical manager process spinning at 100% CPU when a PGD worker becomes unresponsive to `SIGTERM`.
  details: |
    When the pglogical manager process died with an error and tried to terminate other PGD workers, it hung if those workers had died uncleanly or were stuck and unable to receive signals. The process now exits correctly in all such cases.
  jira: BDR-7972
  addresses: "60272"
  type: Bug Fix
  impact: Low
