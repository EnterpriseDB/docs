# yaml-language-server: $schema=https://raw.githubusercontent.com/EnterpriseDB/docs/refs/heads/develop/tools/automation/generators/relgen/relnote-schema.json
product: EDB Postgres Distributed
version: 6.2.0
date:  5 December 2025
intro: |
  EDB Postgres Distributed 6.3.0 includes new features, enhancements, and bug fixes focused on improving stability and reliability.
highlights: |
  - **Highlight 1**: 

relnotes:
- relnote: Added `pgd raft set-leader` command. 
  details: |
    Allows users to manually change the Raft leader for a specific group.
  jira:  BDR-7645
  addresses: ""
  type: Feature
  impact: Medium
- relnote: Added `pgd raft enable` and `pgd raft disable` commands.
  details: |
    Enables or disables consensus (Raft) at node, group, or cluster level.
  jira:  BDR-7669
  addresses: ""
  type: Feature
  impact: Medium
- relnote: Added TDE Options for `pgd node upgrade` command.
  details: |
    Adds `--key-unwrap-command` and `--copy-by-block` options required by `pg_upgrade`.
  jira:  BDR-7588
  addresses: ""
  type: Feature
  impact: Medium
- relnote: Drop associated replication sets when dropping group.
  details: |
    Dropping a group now also drops its associated replication sets.
  jira:  BDR-7033
  addresses: "7531"
  type: Enhancement
  impact: Medium
- relnote: Fixed encoding charset issue with `pgd setup` command.
  details: |
    The `pgd setup` command now fetches encoding from the remote node, defaulting to UTF8 if unavailable.
  jira:  BDR-7297
  addresses: ""
  type: Bug Fix
  impact: Medium
- relnote: Fixed inline help for `pgd group set-option` command.
  details: |
    Help text now correctly reflects group options.
  jira:  BDR-7254
  addresses: ""
  type: Bug Fix
  impact: Medium
- relnote: Fixed matrix view output for `pgd replication show` command.
  details: |
    Inactive/disconnected slots now display `!` instead of `*` when lag is below 10 MB, restoring consistency.
  jira:  BDR-7623
  addresses: ""
  type: Bug Fix
  impact: Medium
- relnote: Fixed growth of consensus shared memory queue.
  details: |
    Prevents memory growth when a node is unreachable; memory is now reclaimed promptly.
  jira:  BDR-7674
  addresses: ""
  type: Bug Fix
  impact: Medium
- relnote: Fixed memory leak in consensus.
  details: |
    Resolves a small malloc-based memory leak related to freeing connection strings.
  jira:  BDR-7650
  addresses: ""
  type: Bug Fix
  impact: Medium
- relnote: Fixed `conn_mgr_use_https` option.
  details: |
    Ensures HTTP is used for status endpoint when `conn_mgr_use_https` is false.
  jira:  BDR-7596
  addresses: ""
  type: Bug Fix
  impact: Medium
- relnote: Fixed memory leak on configuration reload.
  details: |
    Addresses memory leak in Connection Manager during configuration reload.
  jira:  BDR-7535
  addresses: ""
  type: Bug Fix
  impact: Medium
- relnote: Improved consistency in `pg_hba.conf` matching.
  details: |
    - Improved `samerole` matching.
    - Added support for `sameuser`.
    - Improved `+rolename` matching (direct/indirect members).
    - Strips quotes from usernames before matching.
  jira:  BDR-7376
  addresses: ""
  type: Enhancement
  impact: Medium
- relnote: Added support for user name maps (`pg_hba.conf`).
  details: |
    Applies to `cert` authentication method in Connection Manager.
  jira:  BDR-6735
  addresses: ""
  type: Enhancement
  impact: Medium
- relnote: Fixed Segfault when `pgaudit.role` set to non-default.
  details: |
    Prevents crash when `pgaudit.role` is set to a non-default value and `COPY` is used.
  jira:  BDR-7701
  addresses: "8060"
  type: Bug Fix
  impact: Medium
- relnote: Improved the `bdr.reconcile_2pc_requests` table and added the view `bdr.reconcile_2pc_requests_summary`.
  details: |
    Enhanced `bdr.reconcile_2pc_requests` to include more details such as request time, origin LSN and commit timestamp. Additionally, added a user friendly view `bdr.reconcile_2pc_requests_summary`.
  jira:  BDR-7701
  addresses: ""
  type: Enhancement
  impact: Medium
- relnote: Fixed an issue where setting `retention_period` and `analytics_offload_period` simultaneously on AutoPartition tables caused conflicts.
  details: |
    Improved the coordination between data retention and analytics offloading. Partitions are now offloaded using Postgres Analytics Accelerator (PGAA) before the data retention policy is applied.
  jira:  BDR-7235
  addresses: ""
  type: Bug Fix
  impact: Medium
- relnote: Fixed an issue with analytics replicator which could cause redundant replication processes.
  details: |
    In cluster topologies with subgroups and analytics enabled in the parent group, a bug caused each subgroup's write leader to start its own analytics replicator instance, resulting in duplicated rows. This fix ensures that only one analytics replicator per PGD group runs across the cluster.
  jira:  BDR-7542
  addresses: ""
  type: Bug Fix
  impact: Medium
- relnote: Fixed an issue with analytics replicator which could cause redundant replication processes.
  details: |
    In cluster topologies with subgroups and analytics enabled in the parent group, a bug caused each subgroup's write leader to start its own analytics replicator instance, resulting in duplicated rows. This fix ensures that only one analytics replicator per PGD group runs across the cluster.
  jira:  BDR-7542
  addresses: ""
  type: Bug Fix
  impact: Medium