# yaml-language-server: $schema=https://raw.githubusercontent.com/EnterpriseDB/docs/refs/heads/develop/tools/automation/generators/relgen/relnote-schema.json
product: EDB Postgres Distributed
version: 6.3.0
date:  26 March 2026
intro: |
  EDB Postgres Distributed 6.3.0 includes new features, enhancements, and bug fixes focused on improving stability and reliability.
highlights: |
  - **Enhanced distributed locking**: Improved lock handling during change application to prevent data corruption during concurrent operations.
  - **Connection Manager robustness**: Resolved critical infinite loops and memory leaks in the Connection Manager, specifically for session pooling and configuration reloads.
  - **Raft management**: New CLI commands to manually set Raft leaders and toggle consensus at various scopes.

relnotes:
- relnote: Added the `pgd raft set-leader` command. 
  details: |
    Introduced the `pgd raft set-leader` command, allowing users to manually change the Raft leader for a specific group.
  jira:  BDR-7645
  addresses: ""
  type: Feature
  impact: Medium
- relnote: Added `pgd raft enable` and `pgd raft disable` commands.
  details: |
    Added commands to enable or disable consensus (Raft) across different nodes, groups, or cluster levels.
  jira:  BDR-7669
  addresses: ""
  type: Feature
  impact: Medium
- relnote: Improved the group deletion process to automatically drop associated replication sets.
  details: |
    Enhanced the node group removal logic to automatically drop replication sets of the same name. 
  jira:  BDR-7033
  addresses: "57531"
  type: Enhancement
  impact: Medium
- relnote: Fixed encoding charset issue with `pgd setup` command.
  details: |
    The command now attempts to fetch the encoding value directly from the remote node, defaulting to UTF8 if unavailable.
  jira:  BDR-7297
  addresses: ""
  type: Bug Fix
  impact: Medium
- relnote: Fixed the in-line help for `pgd group set-option` command.
  details: |
    Corrected the help text for `pgd group set-option` to accurately reflect group-level options.
  jira:  BDR-7254
  addresses: ""
  type: Bug Fix
  impact: Medium
- relnote: Fixed the matrix view output for the `pgd replication show` command.
  details: |
    Inactive/disconnected slots now display `!` instead of `*` when lag is below 10 MB, restoring consistency.
  jira:  BDR-7623
  addresses: "56295"
  type: Bug Fix
  impact: Medium
- relnote: Fixed a memory growth in the consensus shared memory queue.
  details: |
    Prevented shared memory queues used by consensus from growing while a node is unreachable, ensuring that memory remains stable during node outages.
  jira:  BDR-7674
  addresses: ""
  type: Bug Fix
  impact: Medium
- relnote: Fixed a memory leak in the consensus process when subscriber-only nodes are down.
  details: |
    Resolved a malloc-based memory leak related to the improper freeing of connection strings.
  jira:  BDR-7650
  addresses: ""
  type: Bug Fix
  impact: Medium
- relnote: Fixed an issue where the `conn_mgr_use_https` node group configuration option was ignored.
  details: |
    Resolved a bug where the Connection Manager incorrectly treated the `conn_mgr_use_https` group option as always being `true`. The Connection Manager now correctly uses HTTP for its status endpoint when this option is set to `false`.
  jira:  BDR-7596
  addresses: ""
  type: Bug Fix
  impact: Medium
- relnote: Fixed a Connection Manager memory leak occurring during configuration reloads.
  details: |
    Resolved a memory leak in the Connection Manager caused by incorrect handling of Postgres memory contexts during configuration reloads.
  jira:  BDR-7335
  addresses: ""
  type: Bug Fix
  impact: Medium
- relnote: Improved the consistency of Connection Manager against `pg_hba.conf`.
  details: |
    Enhanced how the Connection Manager matches database names and usernames against `pg_hba.conf` fields. Key improvements include support for `sameuser` matching, refined `samerole` logic, and expanded `+rolename` matching to include the role itself and indirect members. Additionally, quotes are now stripped from usernames before matching to ensure consistent authentication behavior.
  jira:  BDR-7376
  addresses: ""
  type: Enhancement
  impact: Medium
- relnote: Added support for user name mapping (`pg_ident.conf`) to the Connection Manager.
  details: |
    This enhancement allows the Connection Manager to use `pg_ident.conf` for user name mapping. Currently, this functionality applies to the `cert` authentication method, aligning Connection Manager behavior with PostgreSQL’s native authentication identity mapping.
  jira:  BDR-6735
  addresses: ""
  type: Enhancement
  impact: Medium
- relnote: Fixed a segmentation fault occurring during `COPY` commands when `pgaudit.role` set to a non-default value.
  details: |
    Resolved an issue where Postgres would crash with a segmentation fault when executing a `COPY` command if the `pgaudit.role` configuration was set to a non-default value. 
  jira:  BDR-7701
  addresses: "58060"
  type: Bug Fix
  impact: Medium
- relnote: Improved the `bdr.reconcile_2pc_requests` table and added the view `bdr.reconcile_2pc_requests_summary`.
  details: |
    Enhanced `bdr.reconcile_2pc_requests` to include more details such as request time, origin LSN, and commit timestamp. Additionally, added a user-friendly view, `bdr.reconcile_2pc_requests_summary`, to simplify monitoring of Two-Phase Commit (2PC) reconciliation.
  jira:  BDR-7361
  addresses: ""
  type: Enhancement
  impact: Medium
- relnote: Fixed an issue where setting `retention_period` and `analytics_offload_period` simultaneously on AutoPartition tables caused conflicts.
  details: |
    Improved the coordination between data retention and analytics offloading. Partitions are now offloaded using Postgres Analytics Accelerator (PGAA) before the data retention policy is applied.
  jira:  BDR-7235
  addresses: ""
  type: Bug Fix
  impact: Medium
- relnote: Fixed an issue with analytics replicator which could cause redundant replication processes.
  details: |
    In cluster topologies with subgroups and analytics enabled in the parent group, a bug caused each subgroup's write leader to start its own analytics replicator instance, resulting in duplicated rows. This fix ensures that only one analytics replicator per PGD group runs across the cluster.
  jira:  BDR-7542
  addresses: ""
  type: Bug Fix
  impact: Medium
- relnote: Fixed an infinite loop in the Connection Manager that occurred when a server connection was unexpectedly closed.
  details: |
    Resolved a race condition in the Connection Manager where an unexpected server disconnection during the retrieval process from a connection pool would trigger an infinite loop. This issue was specifically limited to clusters operating in session pooling mode.
  jira:  BDR-7802
  addresses: ""
  type: Bug Fix
  impact: Medium
- relnote: Improved lock handling during change application to prevent data corruption from concurrent backends.
  details: |
    Table and index locks are now held until transaction commit when applying changes. This ensures correct serialization and prevents data consistency issues during concurrent operations, specifically addressing risks introduced by parallel apply.
  jira:  BDR-7730
  addresses: ""
  type: Bug Fix
  impact: Medium
- relnote: Parallel Apply can now be enabled when PGD is deployed with community Postgres.  
  details: |
    Resolved an issue where enabling Parallel Apply on community PostgreSQL caused writer hangs and stuck subscriptions due to frequent lock timeouts. This fix allows Parallel Apply to be used reliably without requiring it to be disabled as a workaround.
  jira:  BDR-7298
  addresses: "54565, 57005, 57327"
  type: Bug Fix
  impact: Medium
- relnote: Standalone macOS PGD CLI is now ARM64 only.
  details: |
    The standalone PGD CLI for macOS is now exclusively available for the Apple Silicon (ARM64) architecture. This change applies only to the standalone macOS binary; the availability and support for standalone PGD CLI binaries on GNU/Linux remain unchanged.
  jira: 
  type: Change
  impact: Low
- relnote: Improved conflict handling for origin changes in group commit.
  details: |
    Enhanced group commit to perform eager conflict detection and resolution when the origin of a transaction changes. Conflict handling now relies on timestamp-based detection rather than replication-progress speculation. To ensure optimal performance and avoid increased commit latency, you must synchronize system clocks across all nodes.
  jira: BDR-7509
  type: Enhancement
  impact: Medium
- relnote: Added the `bdr.stat_reconcile_commit_scope` view for improved monitoring.
  details: |
    Introduced a new system view, `bdr.stat_reconcile_commit_scope`, which provides real-time statistics for commit scope reconciliation.
  jira: BDR-7362
  type: Enhancement
  impact: Medium
- relnote: Improved write leader election logic via two new `bdr.node_group_config` options.
  details: |
    Introduced the following new `bdr.node_group_config` options which allow the cluster to select the most advanced candidate replica during leader transitions:
    - `leader_progress_tracking_enable`: Periodically reports replication progress to the Raft leader.
    - `leader_progress_tracking_period`: Configures the reporting interval.
  jira: BDR-7047
  type: Enhancement
  impact: Medium
- relnote: Fixed a replication crash loop caused by interrupted partition detaching.
  details: |
    Resolved an issue where logical replication would enter an infinite crash loop if a `DETACH PARTITION CONCURRENTLY` command was interrupted. Previously, the walsender would fail with the error `relation has no parent because it's being detached` when decoding WAL for a partition in a `detach-pending` state. 
  jira: BDR-7245
  addresses: "53628, 59291"
  type: Bug Fix
  impact: High