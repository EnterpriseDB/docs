# yaml-language-server: $schema=https://raw.githubusercontent.com/EnterpriseDB/docs/refs/heads/develop/tools/automation/generators/relgen/relnote-schema.json
product: EDB Postgres Distributed
version: 6.3.1
date:  09 April 2026
intro: |
  EDB Postgres Distributed 6.3.1 includes only bug fixes focused on improving stability and reliability. No new features or enhancements are included in this release.

relnotes:
- relnote: Fixed a segfault in the consensus worker during rolling upgrade from 6.2.0 to 6.3.0.
  details: |
    A crash occurred when a 6.2.0 node sent a `reconcile_2pc_requests` Raft upsert to a 6.3.0 node. The mismatch was caused by three new columns added in the 6.3.0 migration without a corresponding consensus schema version bump, resulting in a crash loop on restart. The fix adds padding logic to handle upsert entries with fewer columns than the current schema.
  jira: BDR-7874
  type: Bug Fix
  impact: High
- relnote: Fixed `bdr_init_physical` failure when PGAA extension is present.
  details: |
    When scaling up a PGD cluster from a single data group to multiple data groups on deployments using the Postgres Analytics Accelerator (PGAA) extension, `bdr_init_physical` failed with `no analytics lease found for database` during the `bdr.remove_unwanted_data()` step. This issue only affected clusters initially provisioned with a single data group that were later scaled out.
  jira: BDR-7889
  type: Bug Fix
  impact: High
- relnote: Fixed user login attributes not replicated to peer nodes.
  details: |
    After a `CREATE USER` statement, the user's login attribute was not propagated to peer nodes, preventing login on any node other than the originating one. This fix ensures role login attributes are correctly included in replication.
  jira: BDR-7878
  type: Bug Fix
  impact: Medium
