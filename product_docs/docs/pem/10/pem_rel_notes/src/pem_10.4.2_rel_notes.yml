# yaml-language-server: $schema=https://raw.githubusercontent.com/EnterpriseDB/docs/refs/heads/develop/tools/automation/generators/relgen/relnote-schema.json
product: Postgres Enterprise Manager
version: 10.4.2
date: 14 May 2026
intro: |
  Bug fixes and security improvements in Postgres Enterprise Manager 10.4.2 include the following:

relnotes:  
- relnote: Fixed the upgrade file to handle the `pemhistory` `log_configuration` table
    for the `log_connections` column.
  type: Bug Fix
  jira: PEM-6078
  impact: low

- relnote: PEM upgrade now errors out when an upgrade script fails, preventing silent
    partial upgrades.
  type: Bug Fix
  jira: PEM-6079
  impact: medium

- relnote: Fixed an issue where it was not possible to filter by server in the Barman
    dashboard's candle chart.
  type: Bug Fix
  jira: PEM-6081
  impact: low

- relnote: Updated Cryptography to 46.0.7 to fix CVE-2026-39892, protecting users
    from potential security vulnerabilities in cryptographic operations.
  type: Security
  jira: ~
  impact: medium

- relnote: Updated urllib3 to 2.7.0 to fix BDSA-2026-9851, protecting users from
    potential security vulnerabilities in HTTP client operations.
  type: Security
  jira: ~
  impact: medium

- relnote: Updated Authlib to 1.6.12 to fix CVE-2026-41425, protecting users from
    potential security vulnerabilities in OAuth and JWT handling.
  type: Security
  jira: ~
  impact: medium

- relnote: Updated Mako to 1.3.12 to fix CVE-2026-41205, protecting users from
    potential security vulnerabilities in template rendering.
  type: Security
  jira: ~
  impact: medium

- relnote: Updated axios/follow-redirects to 1.16.0 to fix CVE-2026-40175,
    CVE-2026-42033, and CVE-2026-42035, protecting users from potential security
    vulnerabilities in HTTP redirect handling.
  type: Security
  jira: ~
  impact: medium

- relnote: Updated PostCSS to 8.5.14 to fix CVE-2026-41305, protecting users from
    potential security vulnerabilities in CSS processing.
  type: Security
  jira: ~
  impact: medium

- relnote: Updated React to 19.2.6 to fix CVE-2026-23869, protecting users from
    potential security vulnerabilities in the UI rendering layer.
  type: Bug Fix
  jira: ~
  impact: medium

- relnote: Fixed CVE-2026-7814 â€” prevented stored XSS in the browser tree and explain
    visualizer by rendering crafted PostgreSQL object names via `textContent` instead
    of `innerHTML` (ported from pgAdmin commit 3294e74).
  type: Security
  jira: ~
  impact: high

- relnote: Fixed CVE-2026-7815 â€” fixed SQL injection in the Maintenance Tool by
    allow-list validating the `INDEX_CLEANUP`, `PARALLEL`, `BUFFER_USAGE_LIMIT`, and
    `TABLESPACE` option fields and routing `reindex_tablespace` through `qtIdent`
    (ported from pgAdmin commit cf53953d9).
  type: Security
  jira: ~
  impact: high

- relnote: Fixed CVE-2026-7816 â€” fixed OS command injection in the Import/Export
    query-export feature by introducing a psql-strtokx-modeled parenthesis-balance
    parser, rejecting null bytes, normalizing line breaks, and allow-list validating
    the `format`, `on_error`, and `log_verbosity` parameters (ported from pgAdmin
    commit 13badc62c).
  type: Security
  jira: ~
  impact: high

- relnote: Fixed CVE-2026-7818 â€” fixed unsafe pickle deserialization in the file-backed
    session manager by prepending a SHA-256 HMAC over the serialized body and verifying
    it with `hmac.compare_digest` before deserialization. Existing session files written
    by prior versions are silently invalidated on read; users are required to re-authenticate
    once after upgrade (ported from pgAdmin commit 30a890337).
  type: Security
  jira: ~
  impact: high

- relnote: Fixed CVE-2026-7819 â€” fixed symbolic-link path traversal in the File Manager
    by resolving paths through `os.path.realpath` in `check_access_permission` and
    opening uploads with `O_NOFOLLOW` and `0o600` file mode (ported from pgAdmin
    commit 435752b83).
  type: Security
  jira: ~
  impact: high

- relnote: Fixed CVE-2026-7820 â€” fixed account-lockout bypass via the Flask-Security
    default `/login` endpoint by overriding `User.is_active` and `User.is_locked()`
    to consult the `locked` column on every authentication path. Includes a SQLite-only
    data normalization migration; no-op on PostgreSQL config databases (ported from
    pgAdmin commit d336c1e78).
  type: Security
  jira: ~
  impact: high