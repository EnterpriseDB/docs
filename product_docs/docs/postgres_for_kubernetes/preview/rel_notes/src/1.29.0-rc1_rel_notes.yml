# yaml-language-server: $schema=https://raw.githubusercontent.com/EnterpriseDB/docs/refs/heads/develop/tools/automation/generators/relgen/relnote-schema.json
product: EDB CloudNativePG Cluster
version: 1.29.0-rc1
date: 13 March 2026
intro: |    
  This release of EDB Postgres® AI for CloudNativePG™ Cluster includes the following:
components:
  "Operator": 1.29.0-rc1
  "CNP plugin": 1.29.0-rc1
  upstream-merge: Upstream [1.29.0](https://cloudnative-pg.io/releases/cloudnative-pg-1-29.0-rc1-released/)
highlights: |
  Updated the deprecation notice for native (in-tree) Barman Cloud support to
  reflect that it will now be removed in EDB Postgres for Kubernetes 1.30.0, rather than
  1.29.0. Users are still encouraged to migrate to the Barman Cloud Plugin.
  ([#10167](https://github.com/cloudnative-pg/cloudnative-pg/pull/10167))
relnotes:
- relnote: |
    PostgreSQL extensions in image catalogs
  details: |
    extended the `ImageCatalog`
    functionality to support PostgreSQL extensions. This allows users to define
    and manage extension-specific images within a catalog, simplifying the
    deployment of customized PostgreSQL builds.
  jira:
  addresses: <a href="https://github.com/cloudnative-pg/cloudnative-pg/pull/9781">#9781</a>
  type: Feature
  impact: High
- relnote: |
    Dynamic network access control via pod selectors
  details: |
    introduced the
    declarative definition of `podSelectorRefs` to manage `pg_hba.conf` rules
    dynamically. By using label selectors to identify client pods, the operator
    automatically resolves their ephemeral IP addresses and updates the PostgreSQL
    host-based authentication rules accordingly. This ensures that only authorized
    workloads in the same namespace can connect to the database, eliminating the
    need for manual IP management or static CIDR ranges.
  jira:
  addresses: <a href="https://github.com/cloudnative-pg/cloudnative-pg/pull/9781">#9781</a>
  type: Feature
  impact: High

- relnote: |
    Shared `ServiceAccount` support
  details: |
    added an optional `serviceAccountName`
    field to both `Cluster` and `Pooler` specifications. This allows multiple
    resources to share a pre-existing ServiceAccount, facilitating one-time IAM
    configurations (such as AWS IRSA, GCP Workload Identity, or Azure Workload
    Identity) across all clusters and poolers. Contributed by @bozkayasalihx.
  jira:
  addresses: <a href="https://github.com/cloudnative-pg/cloudnative-pg/pull/9287">#9287</a>
  type: Feature
  impact: High

### Enhancements

- relnote: |
    Improved the `Pooler` CRD with support for granular configuration of TLS
    cipher suites and minimum/maximum TLS versions. 
  details: |
    This enables administrators
    to meet strict security compliance requirements for pooler-to-client and
    pooler-to-server connections.
    Contributed by @alex1989hu.
  jira:
  addresses: <a href="https://github.com/cloudnative-pg/cloudnative-pg/pull/9571">#9571</a>
  type: Enhancement
  impact: High

- relnote: |
    Improved the reliability of major upgrades by setting `BackoffLimit=0` on the
    upgrade job, preventing unnecessary retries of a failed `pg_upgrade`. 
  details: |
    The operator now automatically deletes the failed job when a user reverts the
    container image, allowing the cluster to restart gracefully on the original
    version.
  jira:
  addresses: <a href="https://github.com/cloudnative-pg/cloudnative-pg/pull/10104">#10104</a>
  type: Enhancement
  impact: High

- relnote: |
    Improved the operator's observability by emitting native Kubernetes events
    during key phases of the reconciliation loop. 
  details: |
    This provides much better
    visibility into the operator's decision-making process and the lifecycle of
    managed resources directly through `kubectl get events`.
  jira:
  addresses: <a href="https://github.com/cloudnative-pg/cloudnative-pg/pull/10040">#10040</a>
  type: Enhancement
  impact: High

- relnote: |
    Extended support for the `k8s.enterprisedb.io/reconciliationDisabled` annotation on
    Backup resources. 
  details: |
    This allows administrators to temporarily freeze the
    operator's reconciliation logic for specific backup objects.
    Contributed by @GabriFedi97.
  jira:
  addresses: <a href="https://github.com/cloudnative-pg/cloudnative-pg/pull/10020">#10020</a>
  type: Enhancement
  impact: High

- relnote: |
    Added a `bin_path` field to the `postgresql.extensions` stanza, as well as in
    `ImageCatalog` and `ClusterImageCatalog` resources. 
  details: |
    This allows extensions to
    specify directory paths for external binaries, which are automatically appended
    to the `PATH` environment variable of the Postgres process.
  jira:
  addresses: <a href="https://github.com/cloudnative-pg/cloudnative-pg/pull/10250">#10250</a>
  type: Enhancement
  impact: High

- relnote: |
    Implemented a finalizer for plugins to ensure that resources managed by a
    plugin are gracefully cleaned up when the corresponding service is deleted.
  jira:
  addresses: <a href="https://github.com/cloudnative-pg/cloudnative-pg/pull/9560">#9560</a>
  type: Enhancement
  impact: High

- relnote: |
    Enhanced the security and reliability of role management by verifying the
    primary status of an instance before each reconciliation cycle.
  jira:
  addresses: <a href="https://github.com/cloudnative-pg/cloudnative-pg/pull/9971">#9971</a>
  type: Enhancement
  impact: High

- relnote: |
    The operator now honors the `primaryUpdateMethod` when adding new PVCs to a
    cluster, ensuring that the rollout strategy (e.g., switchover vs. restart) is
    respected during storage expansion or additions.
  jira:
  addresses: <a href="https://github.com/cloudnative-pg/cloudnative-pg/pull/9720">#9720</a>
  type: Enhancement
  impact: High

- relnote: |
    Refined the `alpha.k8s.enterprisedb.io/unrecoverable` annotation logic to allow it to
    function even on pods that have not yet reached the `Ready` state,
    facilitating the recovery of stuck instances.
  jira:
  addresses: <a href="https://github.com/cloudnative-pg/cloudnative-pg/pull/9968">#9968</a>
  type: Enhancement
  impact: High

- relnote: |
    Introduced a "Terminal Error" phase for backups that encounter unrecoverable
    issues (such as invalid credentials or non-existent cloud buckets).
  details: |
    This ensures the operator stops retrying doomed operations, preventing
    resource exhaustion and providing immediate, clear feedback in the status.
  jira:
  addresses: <a href="https://github.com/cloudnative-pg/cloudnative-pg/pull/9353">#9353</a>
  type: Enhancement
  impact: High

- relnote: |
    Improved monitoring of long-running backups by introducing
    `reconciliationStartedAt` and `reconciliationTerminatedAt` fields to the
    `Backup` status. 
  details: |
    This change separates the operator's internal lifecycle from
    the actual backup tool's execution timing (`startedAt`/`stoppedAt`), allowing
    users to track when the operator begins processing a request.
  jira:
  addresses: <a href="https://github.com/cloudnative-pg/cloudnative-pg/pull/9351">#9351</a>
  type: Enhancement
  impact: High

- relnote: |
    Added a `Pending` phase to the `Backup` status to explicitly indicate when a
    backup is queued and waiting for an available worker or instance availability.
  jira:
  addresses: <a href="https://github.com/cloudnative-pg/cloudnative-pg/pull/9364">#9364</a>
  type: Enhancement
  impact: High

### Security and Supply Chain

- relnote: |
    Security best practices integration**: integrated the OpenSSF baseline
    scanner and added a `SECURITY-INSIGHTS.yaml` file to the repository to align
    with industry-standard security reporting.
  jira:
  addresses: <a href="https://github.com/cloudnative-pg/cloudnative-pg/pull/10054">#10054</a>, <a href="https://github.com/cloudnative-pg/cloudnative-pg/pull/10062">#10062</a>
  type: Security
  impact: High

- relnote: |
    SLSA provenance and SBOMs**: added SLSA (Supply-chain Levels for Software
    Artifacts) provenance to release binaries and container images. 
  details: |
    Additionally,
    enabled Software Bill of Materials (SBOM) generation within the GoReleaser
    pipeline for improved dependency transparency.
  jira:
  addresses: <a href="https://github.com/cloudnative-pg/cloudnative-pg/pull/10048">#10048</a>, <a href="https://github.com/cloudnative-pg/cloudnative-pg/pull/10074">#10074</a>
  type: Security
  impact: High

- relnote: |
    Password leak prevention**: fixed a potential security risk where PostgreSQL
    could leak role passwords in the logs during specific reconciliation phases.
  jira:
  addresses: <a href="https://github.com/cloudnative-pg/cloudnative-pg/pull/9950">#9950</a>
  type: Security
  impact: High

### Changes

- relnote: |
    Updated the default PostgreSQL version to 18.3 (image `18.3-standard-ubi9`).
  jira:
  addresses: <a href="https://github.com/cloudnative-pg/cloudnative-pg/pull/10090">#10090</a>
  type: Change
  impact: High

### Fixes

- relnote: |
    Fixed an issue where replicas would get stuck in a `Pending` state if the
    `VolumeSnapshot` used for the initial bootstrap had been deleted. 
  details: |
    The
    operator now validates snapshot existence before use; if a snapshot is missing,
    it attempts to use the next available candidate or falls back to
    `pg_basebackup`.
  jira:
  addresses: <a href="https://github.com/cloudnative-pg/cloudnative-pg/pull/10192">#10192</a>
  type: Bug Fix
  impact: High

- relnote: |
    Prevented the "supervised primary" rollout strategy from consuming all
    available rollout slots, which previously caused delays in scheduled updates.
    Contributed by @ermakov-oleg.
  jira:
  addresses: <a href="https://github.com/cloudnative-pg/cloudnative-pg/pull/9977">#9977</a>
  type: Bug Fix
  impact: High

- relnote: |
    Fixed an issue where certain hot-standby parameter changes were not being
    correctly applied to replica clusters.
  jira:
  addresses: <a href="https://github.com/cloudnative-pg/cloudnative-pg/pull/9952">#9952</a>
  type: Bug Fix
  impact: High

- relnote: |
    Fixed a bug in the CNPG-I reconciler hook that could lead to skipping
    subsequent plugins when a "continue" result was returned.
    Contributed by @sharifmshaker.
  jira:
  addresses: <a href="https://github.com/cloudnative-pg/cloudnative-pg/pull/9978">#9978</a>
  type: Bug Fix
  impact: High

- relnote: |
    Fixed a deadlock scenario that occurred when attempting to resize a
    filesystem on a PVC that was not currently attached to a Pod.
    Contributed by @jmealo.
  jira:
  addresses: <a href="https://github.com/cloudnative-pg/cloudnative-pg/pull/9981">#9981</a>
  type: Bug Fix
  impact: High

- relnote: |
    Refined the bootstrap recovery logic by adding a missing check for
    `ConnectionParameters` and updating error messages to include all valid
    configuration types.
  jira:
  addresses: <a href="https://github.com/cloudnative-pg/cloudnative-pg/pull/10268">#10268</a>
  type: Bug Fix
  impact: High

- relnote: |
    Volume names for extensions and tablespaces are now prefixed to avoid naming
    collisions with standard cluster volumes.
  jira:
  addresses: <a href="https://github.com/cloudnative-pg/cloudnative-pg/pull/9973">#9973</a>
  type: Bug Fix
  impact: High

- relnote: |
    Improved feedback when hibernating a non-healthy cluster. While the operator
    correctly defers hibernation until a cluster recovers, this state is now
    explicitly reported via a `WaitingForHealthy` condition, making it visible
    through `cnp status`.
  jira:
  addresses: <a href="https://github.com/cloudnative-pg/cloudnative-pg/pull/10193">#10193</a>
  type: Bug Fix
  impact: High

- relnote: |
    Removed unnecessary pod existence checks from the `FencingMetadataExecutor`
    to streamline the fencing process, particularly in environments where pods
    may be quickly deleted.
  jira:
  addresses: <a href="https://github.com/cloudnative-pg/cloudnative-pg/pull/10035">#10035</a>
  type: Bug Fix
  impact: High

- relnote: |
    Fixed the cluster and pooler service reconcilers to detect changes to all
    spec fields (such as `loadBalancerSourceRanges`) when using the patch update
    strategy, which previously only compared selectors, labels, and annotations.
  jira:
  addresses: <a href="https://github.com/cloudnative-pg/cloudnative-pg/pull/10190">#10190</a>
  type: Bug Fix
  impact: High

- relnote: |
    Fixed a race condition in the deprecated in-tree Barman Cloud backup
    implementation affecting parallel WAL restore, where prefetched files could
    be read while still being downloaded, causing PostgreSQL recovery to fail
    with "invalid checkpoint record" errors.
  jira:
  addresses: <a href="https://github.com/cloudnative-pg/cloudnative-pg/pull/10285">#10285</a>
  type: Bug Fix
  impact: High

- relnote: |
    The cnp plugin now correctly propagates ImagePullSecrets to the
      `pgbench` Job pod template.
  jira:
  component: CNP plugin
  addresses: <a href="https://github.com/cloudnative-pg/cloudnative-pg/pull/10174">#10174</a>
  type: Bug Fix
  impact: High
