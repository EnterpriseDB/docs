# yaml-language-server: $schema=https://raw.githubusercontent.com/EnterpriseDB/docs/refs/heads/develop/tools/automation/generators/relgen/relnote-schema.json
product: EDB CloudNativePG Cluster
version: 1.22.11
date: 25 July 2025
intro: |
  This release of EDB Postgres® AI for CloudNativePG™ Cluster includes the following:
components:
  "Operator": 1.22.11
  "CNP plugin": 1.22.11
  upstream-merge: Upstream [1.22.11](https://cloudnative-pg.io/docs/1.22/release_notes/v1.22/)
relnotes:
- relnote: |
    Removed `386` and ARM (v5/v6/v7) architectures from the `cnp` plugin build
    matrix, reducing the number of published binaries
    ([#7648](https://github.com/EnterpriseDB/cloud-native-postgres/pull/7648)).
  jira:
  addresses:
  type: Change
  impact: High

- relnote: |
    Improved validation of `shared_buffers` by correctly considering `HugePages`
    settings, ensuring accurate memory configuration checks
    ([#7864](https://github.com/EnterpriseDB/cloud-native-postgres/pull/7864)).
  jira:
  addresses:
  type: Enhancement
  impact: High

- relnote: |
    Set `oom_score_adj` for PostgreSQL worker processes to improve prioritization
    during out-of-memory situations
    ([#7891](https://github.com/EnterpriseDB/cloud-native-postgres/pull/7891)).
  jira:
  addresses:
  type: Enhancement
  impact: High

- relnote: |
    Added the `systemID` field and related condition in the `Cluster` status to
    track the PostgreSQL system identifier.
    ([#7717](https://github.com/EnterpriseDB/cloud-native-postgres/pull/7717)).
  jira:
  addresses:
  type: Enhancement
  impact: High

- relnote: |
    Added a mutex in the connection pooler to protect concurrent access to the
    connections map, improving stability in high-concurrency environments
    ([#7804](https://github.com/EnterpriseDB/cloud-native-postgres/pull/7804)).
  jira:
  addresses:
  type: Bug Fix
  impact: High

