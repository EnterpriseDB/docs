<svg viewBox="0 0 400 230" width="600" height="345" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'Inter','Segoe UI',sans-serif">
  <title>Sharding and replication combined: 4 server nodes across 2 shards and 2 replicas, with 3 Keeper nodes</title>
  <desc>Two shards by two replicas giving four server nodes total. Three Keeper nodes sit in the centre coordinating replication.</desc>
  <rect width="400" height="230" rx="10" fill="#F6F9FA"/>
  <text x="126" y="22" text-anchor="middle" font-size="9" fill="#888" font-weight="600">Replica 1</text>
  <text x="274" y="22" text-anchor="middle" font-size="9" fill="#888" font-weight="600">Replica 2</text>
  <text x="50" y="66" text-anchor="end" font-size="9" fill="#888" font-weight="600">Shard 1</text>
  <text x="50" y="178" text-anchor="end" font-size="9" fill="#888" font-weight="600">Shard 2</text>
  <rect x="56" y="42" width="140" height="46" rx="7" fill="#136A7F"/>
  <text x="126" y="65" text-anchor="middle" dominant-baseline="central" font-size="11" font-weight="700" fill="#ffffff">clickhouse-server</text>
  <rect x="204" y="42" width="140" height="46" rx="7" fill="#136A7F"/>
  <text x="274" y="65" text-anchor="middle" dominant-baseline="central" font-size="11" font-weight="700" fill="#ffffff">clickhouse-server</text>
  <line x1="126" y1="88" x2="119" y2="106" stroke="#C8D8DC" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="274" y1="88" x2="281" y2="106" stroke="#C8D8DC" stroke-width="1" stroke-dasharray="3,2"/>
  <rect x="82" y="106" width="74" height="34" rx="7" fill="#F89E5D"/>
  <text x="119" y="123" text-anchor="middle" dominant-baseline="central" font-size="10" font-weight="600" fill="#ffffff">Keeper</text>
  <line x1="156" y1="123" x2="163" y2="123" stroke="#C8D8DC" stroke-width="1"/>
  <rect x="163" y="106" width="74" height="34" rx="7" fill="#F89E5D"/>
  <text x="200" y="123" text-anchor="middle" dominant-baseline="central" font-size="10" font-weight="600" fill="#ffffff">Keeper</text>
  <line x1="237" y1="123" x2="244" y2="123" stroke="#C8D8DC" stroke-width="1"/>
  <rect x="244" y="106" width="74" height="34" rx="7" fill="#F89E5D"/>
  <text x="281" y="123" text-anchor="middle" dominant-baseline="central" font-size="10" font-weight="600" fill="#ffffff">Keeper</text>
  <line x1="119" y1="140" x2="126" y2="155" stroke="#C8D8DC" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="281" y1="140" x2="274" y2="155" stroke="#C8D8DC" stroke-width="1" stroke-dasharray="3,2"/>
  <rect x="56" y="155" width="140" height="46" rx="7" fill="#429D9E"/>
  <text x="126" y="178" text-anchor="middle" dominant-baseline="central" font-size="11" font-weight="700" fill="#ffffff">clickhouse-server</text>
  <rect x="204" y="155" width="140" height="46" rx="7" fill="#429D9E"/>
  <text x="274" y="178" text-anchor="middle" dominant-baseline="central" font-size="11" font-weight="700" fill="#ffffff">clickhouse-server</text>
  <rect x="60" y="214" width="10" height="10" rx="2" fill="#136A7F"/>
  <text x="75" y="223" font-size="8.5" fill="#888">Shard 1 — rows A–M</text>
  <rect x="178" y="214" width="10" height="10" rx="2" fill="#429D9E"/>
  <text x="193" y="223" font-size="8.5" fill="#888">Shard 2 — rows N–Z</text>
  <rect x="296" y="214" width="10" height="10" rx="2" fill="#F89E5D"/>
  <text x="311" y="223" font-size="8.5" fill="#888">Keeper</text>
</svg>
