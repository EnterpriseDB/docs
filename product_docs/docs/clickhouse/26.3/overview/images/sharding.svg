<svg viewBox="0 0 360 82" width="600" height="137" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'Inter','Segoe UI',sans-serif">
  <title>Sharding: two nodes holding different subsets of data</title>
  <desc>Shard 1 holds rows A to M, Shard 2 holds rows N to Z.</desc>
  <rect width="360" height="82" rx="10" fill="#F6F9FA"/>
  <rect x="30" y="14" width="135" height="52" rx="7" fill="#136A7F"/>
  <text x="97" y="35" text-anchor="middle" dominant-baseline="central" font-size="11" font-weight="700" fill="#ffffff">Shard 1</text>
  <text x="97" y="53" text-anchor="middle" dominant-baseline="central" font-size="9" fill="#C8D8DC">rows A – M</text>
  <rect x="195" y="14" width="135" height="52" rx="7" fill="#429D9E"/>
  <text x="262" y="35" text-anchor="middle" dominant-baseline="central" font-size="11" font-weight="700" fill="#ffffff">Shard 2</text>
  <text x="262" y="53" text-anchor="middle" dominant-baseline="central" font-size="9" fill="#E8F4F0">rows N – Z</text>
</svg>
