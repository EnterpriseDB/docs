<svg viewBox="0 0 400 140" width="600" height="210" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'Inter','Segoe UI',sans-serif">
  <title>Replication: two nodes with identical data, coordinated by three Keeper nodes</title>
  <desc>Replica 1 and Replica 2 each hold a full copy. Three Keeper nodes sit below coordinating replication.</desc>
  <rect width="400" height="140" rx="10" fill="#F6F9FA"/>
  <text x="110" y="18" text-anchor="middle" font-size="9" fill="#888" font-weight="600">Replica 1</text>
  <text x="290" y="18" text-anchor="middle" font-size="9" fill="#888" font-weight="600">Replica 2</text>
  <rect x="30" y="26" width="160" height="46" rx="7" fill="#136A7F"/>
  <text x="110" y="43" text-anchor="middle" dominant-baseline="central" font-size="11" font-weight="700" fill="#ffffff">clickhouse-server</text>
  <text x="110" y="59" text-anchor="middle" dominant-baseline="central" font-size="9" fill="#C8D8DC">full copy</text>
  <text x="200" y="49" text-anchor="middle" dominant-baseline="central" font-size="13" fill="#C8D8DC">↔</text>
  <rect x="210" y="26" width="160" height="46" rx="7" fill="#136A7F"/>
  <text x="290" y="43" text-anchor="middle" dominant-baseline="central" font-size="11" font-weight="700" fill="#ffffff">clickhouse-server</text>
  <text x="290" y="59" text-anchor="middle" dominant-baseline="central" font-size="9" fill="#C8D8DC">full copy</text>
  <line x1="110" y1="72" x2="116" y2="92" stroke="#C8D8DC" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="290" y1="72" x2="284" y2="92" stroke="#C8D8DC" stroke-width="1" stroke-dasharray="3,2"/>
  <rect x="82" y="92" width="68" height="34" rx="7" fill="#F89E5D"/>
  <text x="116" y="109" text-anchor="middle" dominant-baseline="central" font-size="10" font-weight="600" fill="#ffffff">Keeper</text>
  <line x1="150" y1="109" x2="166" y2="109" stroke="#C8D8DC" stroke-width="1"/>
  <rect x="166" y="92" width="68" height="34" rx="7" fill="#F89E5D"/>
  <text x="200" y="109" text-anchor="middle" dominant-baseline="central" font-size="10" font-weight="600" fill="#ffffff">Keeper</text>
  <line x1="234" y1="109" x2="250" y2="109" stroke="#C8D8DC" stroke-width="1"/>
  <rect x="250" y="92" width="68" height="34" rx="7" fill="#F89E5D"/>
  <text x="284" y="109" text-anchor="middle" dominant-baseline="central" font-size="10" font-weight="600" fill="#ffffff">Keeper</text>
</svg>
